name: OpenSim Next CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: opensim/opensim-next

jobs:
  # Code quality and security checks
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        components: rustfmt, clippy
        override: true

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          rust/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

    - name: Run rustfmt
      working-directory: rust
      run: cargo fmt --all -- --check

    - name: Run clippy
      working-directory: rust
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Security audit
      working-directory: rust
      run: |
        cargo install cargo-audit
        cargo audit

  # Build and test Zig components
  zig-build:
    name: Build Zig Components
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Zig
      run: |
        wget https://ziglang.org/builds/zig-linux-x86_64-0.14.0-dev.1911+3bf89f55c.tar.xz
        tar -xf zig-linux-x86_64-0.14.0-dev.1911+3bf89f55c.tar.xz
        sudo mv zig-linux-x86_64-0.14.0-dev.1911+3bf89f55c /opt/zig
        echo "/opt/zig" >> $GITHUB_PATH

    - name: Cache Zig build
      uses: actions/cache@v3
      with:
        path: zig/zig-cache/
        key: ${{ runner.os }}-zig-${{ hashFiles('zig/build.zig') }}

    - name: Build Zig components
      working-directory: zig
      run: zig build -Doptimize=ReleaseFast

    - name: Test Zig components
      working-directory: zig
      run: zig build test

    - name: Upload Zig artifacts
      uses: actions/upload-artifact@v3
      with:
        name: zig-artifacts
        path: zig/zig-out/

  # Build and test Rust components
  rust-build:
    name: Build & Test Rust
    needs: zig-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, x86_64-unknown-linux-musl]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        override: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libssl-dev libpq-dev libsqlite3-dev protobuf-compiler

    - name: Download Zig artifacts
      uses: actions/download-artifact@v3
      with:
        name: zig-artifacts
        path: rust/zig-out/

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          rust/target/
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

    - name: Build Rust application
      working-directory: rust
      run: cargo build --release --target ${{ matrix.target }}

    - name: Run tests
      working-directory: rust
      run: cargo test --release --target ${{ matrix.target }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: opensim-next-${{ matrix.target }}
        path: rust/target/${{ matrix.target }}/release/opensim-next

  # Integration tests
  integration-tests:
    name: Integration Tests
    needs: [zig-build, rust-build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opensim_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v3
      with:
        name: opensim-next-x86_64-unknown-linux-gnu
        path: ./

    - name: Make binary executable
      run: chmod +x opensim-next

    - name: Run integration tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opensim_test
        REDIS_URL: redis://localhost:6379
        OPENSIM_API_KEY: test-api-key
      run: |
        ./opensim-next --version
        # Add more integration tests here

  # Build and push Docker images
  docker-build:
    name: Build Docker Images
    needs: [quality, integration-tests]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: deployment/docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

    - name: Deploy to staging
      run: |
        kubectl apply -f deployment/kubernetes/ -n opensim-next-staging
        kubectl set image deployment/opensim-next opensim-next=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop -n opensim-next-staging
        kubectl rollout status deployment/opensim-next -n opensim-next-staging --timeout=300s

    - name: Run smoke tests
      run: |
        # Wait for deployment to be ready
        kubectl wait --for=condition=ready pod -l app=opensim-next -n opensim-next-staging --timeout=180s
        
        # Get service endpoint
        STAGING_URL=$(kubectl get svc opensim-next -n opensim-next-staging -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        
        # Run smoke tests
        curl -f http://$STAGING_URL/health || exit 1
        curl -f http://$STAGING_URL/metrics || exit 1

  # Deploy to production
  deploy-production:
    name: Deploy to Production
    needs: docker-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

    - name: Deploy to production
      run: |
        kubectl apply -f deployment/kubernetes/ -n opensim-next
        kubectl set image deployment/opensim-next opensim-next=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} -n opensim-next
        kubectl rollout status deployment/opensim-next -n opensim-next --timeout=600s

    - name: Verify production deployment
      run: |
        kubectl wait --for=condition=ready pod -l app=opensim-next -n opensim-next --timeout=300s
        
        PROD_URL=$(kubectl get svc opensim-next -n opensim-next -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        
        curl -f http://$PROD_URL/health || exit 1
        curl -f http://$PROD_URL/metrics || exit 1

  # Security scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request'
    steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Performance benchmarks
  benchmarks:
    name: Performance Benchmarks
    needs: rust-build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Download Zig artifacts
      uses: actions/download-artifact@v3
      with:
        name: zig-artifacts
        path: rust/zig-out/

    - name: Run benchmarks
      working-directory: rust
      run: cargo bench --all-features

    - name: Store benchmark results
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'cargo'
        output-file-path: rust/target/criterion/report/index.html
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true