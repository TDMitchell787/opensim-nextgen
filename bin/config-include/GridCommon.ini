[Modules]
; Common grid modules for OpenSim Next

; Asset module
AssetServices = "RemoteAssetServicesConnector"

; Inventory module  
InventoryServices = "RemoteXInventoryServicesConnector"

; Avatar services
AvatarServices = "RemoteAvatarServicesConnector"

; Authentication services
AuthenticationServices = "RemoteAuthenticationServicesConnector"

; User account services
UserAccountServices = "RemoteUserAccountServicesConnector"

; Grid services
GridServices = "RemoteGridServicesConnector"

; Presence services
PresenceServices = "RemotePresenceServicesConnector"

; Friends services
FriendsServices = "RemoteFriendsServicesConnector"

; Messaging
MessageTransferModule = "MessageTransferModule"
LureModule = "LureModule"

; OpenSim Next enhanced modules
PhysicsModule = "OpenSimNextPhysics"
EntityTransferModule = "OpenSimNextEntityTransfer"
HGEntityTransferModule = "OpenSimNextHGEntityTransfer"

[AssetService]
; LocalGrid asset service configuration
AssetServerURI = "http://127.0.0.1:9000"

[InventoryService]
; LocalGrid inventory service configuration  
InventoryServerURI = "http://127.0.0.1:9000"

[GridService]
; LocalGrid grid service configuration
GridServerURI = "http://127.0.0.1:9000"

[AvatarService]
; LocalGrid avatar service configuration
AvatarServerURI = "http://127.0.0.1:9000"

[PresenceService]
; LocalGrid presence service configuration
PresenceServerURI = "http://127.0.0.1:9000"

[UserAccountService]
; LocalGrid user account service configuration
UserAccountServerURI = "http://127.0.0.1:9000"

[AuthenticationService] 
; LocalGrid authentication service configuration
AuthenticationServerURI = "http://127.0.0.1:9000"

[FriendsService]
; LocalGrid friends service configuration
FriendsServerURI = "http://127.0.0.1:9000"

[Messaging]
; LocalGrid messaging configuration
OfflineIMService = "http://127.0.0.1:9000"
MuteListService = "http://127.0.0.1:9000"

[Groups]
; LocalGrid groups configuration
GroupsServerURI = "http://127.0.0.1:9000"

[Economy]
; LocalGrid economy service configuration
EconomyServerURI = "http://127.0.0.1:9000"

[HGInstantMessageService]
; LocalGrid hypergrid instant messaging
IMServerURI = "http://127.0.0.1:9000"

[MapImageService]
; LocalGrid map image service
MapImageServerURI = "http://127.0.0.1:9000"

[Hypergrid]
; LocalGrid hypergrid configuration
HomeURI = "http://127.0.0.1:9000"
GatekeeperURI = "http://127.0.0.1:9000"
Enabled = true
AllowTeleportsToAnyRegion = true
DenyAnonymousAccess = false
ForeignAssetsAllowed = true