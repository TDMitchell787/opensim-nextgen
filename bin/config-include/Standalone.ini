[Includes]
; OpenSim Next Standalone Configuration
; This file configures OpenSim Next for standalone operation

; Database configuration - Using PostgreSQL (configured in [DatabaseService] below)
; Include-Storage = "storage/SQLiteStandalone.ini"  ; Not used - PostgreSQL configured inline

; Asset services
Include-AssetService = "AssetService.ini"

; Inventory services
Include-InventoryService = "InventoryService.ini"

; Grid services (file not present - using inline config below)
; Include-GridService = "GridService.ini"

; Authentication services (file not present - using inline config below)
; Include-AuthenticationService = "AuthenticationService.ini"

; Avatar services (file not present - using inline config below)
; Include-AvatarService = "AvatarService.ini"

; Presence services (file not present - using inline config below)
; Include-PresenceService = "PresenceService.ini"

; User account services (file not present - using inline config below)
; Include-UserAccountService = "UserAccountService.ini"

; Friends services (file not present - using inline config below)
; Include-FriendsService = "FriendsService.ini"

[Modules]
; Core modules for standalone operation
AssetServices = "LocalAssetServicesConnector"
InventoryServices = "LocalInventoryServicesConnector"
GridServices = "LocalGridServicesConnector"
AvatarServices = "LocalAvatarServicesConnector"
PresenceServices = "LocalPresenceServicesConnector"
UserAccountServices = "LocalUserAccountServicesConnector"
AuthenticationServices = "LocalAuthenticationServicesConnector"
FriendsServices = "LocalFriendsServicesConnector"

; OpenSim Next enhanced modules
PhysicsModule = "OpenSimNextPhysics"
AssetCaching = "OpenSimNextCache"
ScriptEngine = "OpenSimNextLSL"

[DatabaseService]
; Database configuration for OpenSim Next
StorageProvider = "OpenSim.Data.PGSQL.dll"
ConnectionString = "Host=localhost;Database=opensim_db;Username=opensim;Password=CHANGEME"

[AssetService]
; Asset service configuration
DefaultAssetLoader = "OpenSim.Framework.AssetLoader.Filesystem.dll"
AssetLoaderArgs = "assets/AssetSets.xml"

[GridService]
; Grid service configuration
Region_Welcome = "DefaultRegion"
DefaultRegionAccess = "PG"

[LibraryService]
; Library service for default assets
LibraryName = "OpenSim Library"
DefaultLibrary = "./Library/LibraryAssets"

[LoginService]  
; Login service configuration
WelcomeMessage = "Welcome to OpenSim Next!"
SRV_HomeURI = "http://127.0.0.1:9000"
SRV_InventoryServerURI = "http://127.0.0.1:9000"
SRV_AssetServerURI = "http://127.0.0.1:9000"

[GatekeeperService]
; Gatekeeper for Hypergrid
ExternalName = "http://127.0.0.1:9000"
;"http://127.0.0.1:9000"
DeniedUsers = ""
DeniedRegions = ""

[UserAgentService]
; User agent service
ShowUserDetailsInHGProfile = True