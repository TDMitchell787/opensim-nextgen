; OpenSim Next - Local OSSL overrides
; This file overrides defaults from osslDefaultEnable.ini
; Edit this file for region-specific OSSL settings

; do not delete this line;
[OSSL]

  ; OpenSim Next: AI Hybrid NPC Configuration
  ; Our AI NPCs (Aria Builder, Zara Clothier, Reed Scripter, Terra Landscaper, Nova Guide)
  ; are server-side entities that bypass OSSL permission checks entirely.
  ; These settings control what LSL/OSSL *scripts* can do with NPC functions,
  ; enabling community scripts that use osNpc* to interact with our AI NPCs.

  ; Enable all OS functions - required for full NPC/AI integration
  AllowOSFunctions = true

  ; VeryHigh allows most NPC and world-manipulation functions
  OSFunctionThreatLevel = VeryHigh

  ; Parcel macros - enabled for parcel owners and group members
  osslParcelO = "PARCEL_OWNER,"
  osslParcelOG = "PARCEL_GROUP_MEMBER,PARCEL_OWNER,"

  ; NPC macros - open to parcel owners + estate staff
  ; This allows community LSL scripts to create/control NPCs alongside our AI NPCs
  osslNPC = ${OSSL|osslParcelOG}ESTATE_MANAGER,ESTATE_OWNER

  ; AI NPC-specific overrides:
  ; Allow scripts to query NPC list (needed for scripts that detect AI NPCs)
  Allow_osGetNPCList =              true
  ; Allow scripts to get NPC owner (needed for AI NPC identification)
  Allow_osNpcGetOwner =             true
  ; Allow NPC chat functions broadly (AI NPCs respond to nearby chat)
  Allow_osNpcSay =                  ${OSSL|osslNPC}
  Allow_osNpcSayTo =                ${OSSL|osslNPC}
  Allow_osNpcShout =                ${OSSL|osslNPC}
  Allow_osNpcWhisper =              ${OSSL|osslNPC}
