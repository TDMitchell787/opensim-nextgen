[AssetService]
; OpenSim Next Asset Service Configuration
LocalServiceModule = "OpenSim.Services.AssetService.dll:AssetService"
StorageProvider = "OpenSim.Data.PostgreSQL.dll"
ConnectionString = "Host=localhost;Database=opensim_db;Username=opensim;Password=CHANGEME;"
DefaultAssetLoader = "OpenSim.Framework.AssetLoader.Filesystem.dll"
AssetLoaderArgs = "assets/AssetSets.xml"

; Asset caching
AssetCaching = "OpenSimNextCache"
CacheDirectory = "./assetcache"
CacheTimeout = 48
CacheBuckets = 32768

; Performance settings
MaxAssetRequestConcurrency = 30
AssetRetrievalTimeout = 300000

[AssetCache]
; OpenSim Next enhanced asset caching
CacheModule = "OpenSimNextCache"
CacheDirectory = "./assetcache"
LogLevel = "INFO"
FileCountLimit = 4096
FileSizeLimit = 134217728
MemoryCacheTimeout = 2
MemoryCacheSize = 128
DiskCacheTimeout = 48
DiskCacheSize = 1024

; Cache performance
EnableMemoryCache = true
EnableDiskCache = true
EnableDistributedCache = false
CacheHitLogging = false

[LocalAssetServicesConnector]
; Local asset service connector
LocalServiceModule = "OpenSim.Services.Connectors.dll:AssetServicesConnector"
AssetServerURI = "http://127.0.0.1:8003/assets/"

[RemoteAssetServicesConnector]  
; Remote asset service connector for grid mode
LocalServiceModule = "OpenSim.Services.Connectors.dll:AssetServicesConnector"
AssetServerURI = "http://assets.grid.server:8003/assets/"

[HGAssetService]
; Hypergrid asset service
HomeURI = "http://127.0.0.1:9000"
GatekeeperURI = "http://127.0.0.1:9000"

[OpenSimNextAssets]
; OpenSim Next asset enhancements
EnableValidation = true
EnableCompression = true
EnableEncryption = false
MaxAssetSize = 67108864
SupportedFormats = "jpg,jpeg,png,gif,bmp,tga,wav,ogg,mp3,dae,llsd,lsl,notecard"
AssetVersioning = true
AssetBackup = true
BackupDirectory = "./asset-backups"