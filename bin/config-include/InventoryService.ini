[InventoryService]
; OpenSim Next Inventory Service Configuration
LocalServiceModule = "OpenSim.Services.InventoryService.dll:XInventoryService"
StorageProvider = "OpenSim.Data.PostgreSQL.dll"
ConnectionString = "Host=localhost;Database=opensim_db;Username=opensim;Password=CHANGEME;"

; Performance settings
InventoryCacheTimeout = 120
MaxInventoryFolders = 1000
MaxInventoryItems = 10000

[LocalInventoryServicesConnector]
; Local inventory service connector
LocalServiceModule = "OpenSim.Services.Connectors.dll:XInventoryServicesConnector"
InventoryServerURI = "http://127.0.0.1:8003/xinventory"

[RemoteXInventoryServicesConnector]
; Remote inventory service connector for grid mode
LocalServiceModule = "OpenSim.Services.Connectors.dll:XInventoryServicesConnector"  
InventoryServerURI = "http://inventory.grid.server:8003/xinventory"

[HGInventoryService]
; Hypergrid inventory service
HomeURI = "http://127.0.0.1:9000"
GatekeeperURI = "http://127.0.0.1:9000"

[InventoryCache]
; OpenSim Next inventory caching
CacheModule = "OpenSimNextInventoryCache"
CacheTimeout = 300
MaxCachedFolders = 1000  
MaxCachedItems = 5000
EnableMemoryCache = true
EnableDiskCache = false

[LibraryService]
; Library inventory service
LibraryName = "OpenSim Library"
DefaultLibrary = "./Library/LibraryAssets"
LibraryOwnerName = "Library Owner"

[OpenSimNextInventory]
; OpenSim Next inventory enhancements
EnableVersioning = true
EnableBackup = true
BackupDirectory = "./inventory-backups"
EnableSharing = true
EnableSearch = true
SearchIndexUpdate = 300
MaxSearchResults = 100

; Inventory validation
ValidateOnAdd = true
ValidateOnMove = true
ValidatePermissions = true

; Performance optimizations
UseBatchOperations = true
BatchSize = 100
UseLazyLoading = true
PreloadUserRoot = true