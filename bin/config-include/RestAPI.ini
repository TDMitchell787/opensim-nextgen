[RestAPI]
; Enable/disable the REST API server
Enabled = true

; Port for the REST API server
Port = 8080

; Bind address (0.0.0.0 for all interfaces, 127.0.0.1 for localhost only)
BindAddress = "0.0.0.0"

; Maximum request size in bytes (10MB default)
MaxRequestSize = 10485760

; Rate limiting - requests per minute per IP
RateLimitRequestsPerMinute = 100

; Enable CORS for web applications
EnableCORS = true

; Require authentication for all endpoints
RequireAuthentication = true

; API version
APIVersion = "v1"

; Enable Swagger/OpenAPI documentation
EnableSwagger = true

; Swagger UI path (if enabled)
SwaggerPath = "/docs"

[RestAPI_Authentication]
; JWT secret key for token signing (CHANGE IN PRODUCTION!)
JWTSecret = "your-super-secret-jwt-key-change-in-production-or-use-env-var"

; JWT token expiry in hours
JWTExpiryHours = 24

; Require email verification for new accounts
RequireEmailVerification = false

; Maximum failed login attempts before lockout
MaxFailedAttempts = 5

; Lockout duration in minutes
LockoutDurationMinutes = 15

; Session timeout in minutes
SessionTimeoutMinutes = 60

; Allow multiple sessions per user
AllowMultipleSessions = true

[RestAPI_Security]
; Enable HTTPS/SSL
EnableSSL = false

; SSL certificate path
SSLCertPath = ""

; SSL private key path
SSLKeyPath = ""

; Trusted proxy IPs (for rate limiting and logging)
TrustedProxies = "127.0.0.1,::1"

; Enable request logging
LogRequests = true

; Log request bodies (be careful with sensitive data)
LogRequestBodies = false

; Log response bodies
LogResponseBodies = false

[RestAPI_CORS]
; CORS allowed origins (* for all, or specific domains)
AllowedOrigins = "*"

; CORS allowed methods
AllowedMethods = "GET,POST,PUT,DELETE,OPTIONS"

; CORS allowed headers
AllowedHeaders = "Content-Type,Authorization,X-Requested-With"

; CORS expose headers
ExposeHeaders = "X-Total-Count,X-Page-Count"

; CORS max age in seconds
MaxAge = 86400

; Allow credentials
AllowCredentials = true

[RestAPI_Features]
; Enable asset upload/download endpoints
EnableAssetEndpoints = true

; Enable inventory management endpoints
EnableInventoryEndpoints = true

; Enable user management endpoints (admin only)
EnableUserEndpoints = true

; Enable region management endpoints (admin only)
EnableRegionEndpoints = true

; Enable statistics endpoints
EnableStatsEndpoints = true

; Enable WebSocket upgrade endpoint
EnableWebSocketUpgrade = true

; Maximum asset upload size in bytes (50MB default)
MaxAssetUploadSize = 52428800

; Allowed asset types for upload (comma-separated)
AllowedAssetTypes = "texture,sound,mesh,animation,script,notecard,gesture"

; Asset file extensions (comma-separated)
AllowedAssetExtensions = "png,jpg,jpeg,gif,wav,ogg,dae,bvh,lsl,txt"

[RestAPI_Cache]
; Enable response caching
EnableCaching = true

; Default cache TTL in seconds
DefaultCacheTTL = 300

; Cache asset metadata
CacheAssetMetadata = true

; Cache user profiles
CacheUserProfiles = true

; Cache region information
CacheRegionInfo = true

; Maximum cache entries
MaxCacheEntries = 10000

[RestAPI_Database]
; Database connection pool size for REST API
ConnectionPoolSize = 10

; Database query timeout in seconds
QueryTimeoutSeconds = 30

; Enable database connection pooling
EnableConnectionPooling = true

; Maximum concurrent database operations
MaxConcurrentOperations = 50

[RestAPI_Monitoring]
; Enable Prometheus metrics endpoint
EnableMetrics = true

; Metrics endpoint path
MetricsPath = "/metrics"

; Enable request duration histogram
EnableRequestDurationMetrics = true

; Enable request count metrics
EnableRequestCountMetrics = true

; Enable error rate metrics
EnableErrorRateMetrics = true

; Enable authentication metrics
EnableAuthMetrics = true

; Metrics collection interval in seconds
MetricsCollectionInterval = 60

[RestAPI_Advanced]
; Request timeout in seconds
RequestTimeoutSeconds = 30

; Keep-alive timeout in seconds
KeepAliveTimeoutSeconds = 75

; Maximum number of concurrent connections
MaxConcurrentConnections = 1000

; Enable HTTP/2 support
EnableHTTP2 = true

; Enable request compression
EnableCompression = true

; Compression level (1-9, where 9 is maximum compression)
CompressionLevel = 6

; Request ID header name
RequestIDHeader = "X-Request-ID"

; Enable request tracing
EnableTracing = true

; Tracing sample rate (0.0 to 1.0)
TracingSampleRate = 0.1

; Examples of REST API Usage:
;
; 1. Authentication:
;    POST /v1/auth/login
;    {
;      "username": "john_doe",
;      "password": "secure_password",
;      "remember_me": false
;    }
;
; 2. List Assets:
;    GET /v1/assets?page=1&limit=50&asset_type=texture
;    Headers: Authorization: Bearer <token>
;
; 3. Upload Asset:
;    POST /v1/assets
;    Headers: 
;      Authorization: Bearer <token>
;      Content-Type: multipart/form-data
;    Body: 
;      file: <binary data>
;      metadata: {"name": "My Texture", "asset_type": "texture", "is_public": false}
;
; 4. Get User Inventory:
;    GET /v1/inventory/users/{user_id}/items
;    Headers: Authorization: Bearer <token>
;
; 5. Create Region:
;    POST /v1/regions
;    Headers: 
;      Authorization: Bearer <token>
;      Content-Type: application/json
;    Body:
;    {
;      "name": "My Region",
;      "location_x": 1000,
;      "location_y": 1000,
;      "size_x": 256,
;      "size_y": 256,
;      "estate_id": 1
;    }
;
; 6. Get Statistics:
;    GET /v1/stats/overview
;    Headers: Authorization: Bearer <token>
;
; 7. Health Check (no auth required):
;    GET /health
;
; 8. API Information (no auth required):
;    GET /
;
; Curl Examples:
;
; # Login and get token
; curl -X POST http://localhost:8080/v1/auth/login \
;   -H "Content-Type: application/json" \
;   -d '{"username": "admin", "password": "admin"}'
;
; # List assets
; curl -X GET http://localhost:8080/v1/assets \
;   -H "Authorization: Bearer YOUR_TOKEN_HERE"
;
; # Upload asset
; curl -X POST http://localhost:8080/v1/assets \
;   -H "Authorization: Bearer YOUR_TOKEN_HERE" \
;   -F "file=@texture.png" \
;   -F 'metadata={"name": "My Texture", "asset_type": "texture"}'
;
; # Get region list
; curl -X GET http://localhost:8080/v1/regions \
;   -H "Authorization: Bearer YOUR_TOKEN_HERE"