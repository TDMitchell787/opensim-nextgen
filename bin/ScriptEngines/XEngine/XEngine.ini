;; XEngine Compatibility Configuration  
;; This configuration provides compatibility with legacy OpenSim XEngine scripts
;; WARNING: XEngine is deprecated and will be removed in future versions

[XEngine]
;; Enable XEngine compatibility layer (deprecated)
Enabled = false

;; XEngine script execution settings (legacy)
ScriptEnginesPath = "ScriptEngines/XEngine"
CompileOnDemand = true
StartDelay = 15

;; Compilation settings (legacy)
AllowedCompilers = "lsl,cs,js,vb"
DefaultCompileLanguage = "lsl"
WriteScriptSourceToDebugFile = false
CompileWithDebugInformation = false

;; Resource limits (conservative for legacy compatibility)
MaxScriptEventQueue = 100
MaxScriptExecutionTime = 30000
MaxScriptMemory = 262144
ScriptStackSize = 131072

;; LSL function compatibility (limited for security)
AllowGodFunctions = false
AllowOriginFunctions = false
AllowHigherLimits = false
AllowMODFunctions = false
AllowOSFunctions = false

;; Event handling (legacy behavior)
EventAbortOnScriptTimeout = true
KillTimedOutScripts = true
SaveBytecode = false
LoadBytecode = false

;; HTTP settings (disabled for security)
AllowHTTPConnections = false
HTTPTimeout = 10000
HTTPMaxConnections = 0

;; Email settings (disabled for security)  
AllowEmailConnections = false
EmailMaxConnections = 0

;; Sensor settings (limited range)
SensorMaxRange = 96.0
SensorMaxResults = 8

;; Physics settings (very limited)
AllowLightShareFunctions = false
AllowLLCreateLink = false
AllowLLBreakLink = false
AllowLLBreakAllLinks = false

;; State persistence (legacy)
DeleteScriptsOnStartup = false
SaveMinEventDelay = 0.1
MinTimerInterval = 1.0

;; Memory and performance (conservative)
UseAsyncSaveLoad = false
MaxEventsPerSecond = 100
MinEventDelay = 0.01

;; Compatibility flags (legacy XEngine behavior)
AppDomainLoading = true
ScriptStopStrategy = "co-op"
DebuggerSafe = false

;; XEngine specific settings
XEngineLogLevel = "Error"
UseSourceHashCode = false
UseXEngineStateFiles = true

;; Deprecation settings
ShowDeprecationWarnings = true
DeprecationWarningInterval = 3600
LogDeprecationUsage = true

[LSL_Constants]
;; LSL constant definitions for XEngine compatibility (limited set)
LSL_PI = 3.141592653589793
LSL_TWO_PI = 6.283185307179586
LSL_PI_BY_TWO = 1.570796326794897
LSL_DEG_TO_RAD = 0.017453292519943295
LSL_RAD_TO_DEG = 57.29577951308232

[XEngine_Functions]
;; XEngine-specific function configurations (legacy)
;; Most functions are disabled or limited for security

;; Timer functions (limited)
llSetTimerEvent_MinInterval = 1.0

;; Listen functions (limited)
llListen_MaxChannels = 16

;; Sensor functions (limited)
llSensor_MaxRange = 96.0
llSensor_MaxResults = 8

;; HTTP functions (disabled)
llHTTPRequest_MaxConnections = 0
llHTTPRequest_DefaultTimeout = 0

;; Email functions (disabled)
llEmail_MaxConnections = 0
llEmail_DefaultTimeout = 0

[Bytecode]
;; Bytecode settings for XEngine (minimal)
SaveBytecode = false
LoadBytecode = false
BytecodePath = "cache/xengine_bytecode"
CompressBytecode = false
BytecodeTimeout = 1800

[StateFiles]
;; XEngine state file settings
StateFilePath = "ScriptEngines/XEngine/ScriptStates"
UseStateSaves = true
SaveStateInterval = 300
BackupStatePath = "backups/xengine_states"

[Migration]
;; Migration settings from XEngine to newer engines
EnableAutoMigrationToYEngine = true
EnableAutoMigrationToNative = true
MigrationPromptUser = true
MigrationBackupPath = "backups/xengine_migration"
DeleteXEngineStatesAfterMigration = false

[Security]
;; Security restrictions for legacy XEngine scripts
RestrictFileAccess = true
RestrictNetworkAccess = true
RestrictSystemCalls = true
SandboxMode = true
EnableScriptSigning = false
RequireSignedScripts = false

[Monitoring]
;; XEngine monitoring (minimal)
EnableStatistics = true
StatisticsUpdateInterval = 300
EnablePerformanceCounters = false
LogExecutionTimes = false
LogMemoryUsage = true
LogEventQueues = false
LogDeprecationWarnings = true

[Deprecation]
;; Deprecation management
ShowStartupWarning = true
StartupWarningMessage = "XEngine is deprecated. Please migrate scripts to YEngine or Native engine."
LogDeprecationEvents = true
DeprecationLogPath = "logs/xengine_deprecation"
RemovalTargetVersion = "2.0.0"
MigrationGuideURL = "https://opensim-next.docs/migration/xengine-to-native"