;; OpenSim Next Script Engines Configuration
;; This file configures the available script engines and their settings

[ScriptEngines]
;; Default script engine to use for new scripts
DefaultScriptEngine = "Native"

;; Available script engines (comma-separated list)
AvailableEngines = "Native,YEngine,XEngine"

;; Script engine loading order (highest priority first)
LoadOrder = "Native,YEngine,XEngine"

;; Enable script engine hot-swapping (experimental)
EnableHotSwap = true

;; Maximum scripts per region across all engines
MaxScriptsPerRegion = 1000

;; Global script execution timeout (milliseconds)
GlobalScriptTimeout = 30000

;; Enable cross-engine script migration
EnableScriptMigration = true

;; Script engines path (relative to bin/)
ScriptEnginesPath = "ScriptEngines"

[Native]
;; Native Rust LSL implementation (recommended)
;; This is the high-performance native implementation
Enabled = true
Priority = 100
MaxScripts = 500
MaxExecutionTime = 100
MaxMemoryPerScript = 1048576
ThreadPoolSize = 8
EnableDebugging = true
EnableHTTPRequests = true
EnableEmail = true
EnableSensor = true
EnableDataserver = true
PerformanceRating = 10

[YEngine]
;; YEngine compatibility (OpenSim default)
;; Provides compatibility with existing YEngine compiled scripts
Enabled = false
Priority = 60
MaxScripts = 300
MaxExecutionTime = 200
MaxMemoryPerScript = 524288
ThreadPoolSize = 4
EnableDebugging = true
EnableHTTPRequests = true
EnableEmail = true
EnableSensor = true
EnableDataserver = true
DLLPath = "ScriptEngines/YEngine/YEngine.dll"
ConfigPath = "ScriptEngines/YEngine/YEngine.ini"
PerformanceRating = 6

[XEngine]
;; XEngine compatibility (legacy, deprecated in OpenSim)
;; Provides compatibility with legacy XEngine compiled scripts
Enabled = false
Priority = 30
MaxScripts = 200
MaxExecutionTime = 300
MaxMemoryPerScript = 262144
ThreadPoolSize = 2
EnableDebugging = false
EnableHTTPRequests = false
EnableEmail = false
EnableSensor = true
EnableDataserver = false
DLLPath = "ScriptEngines/XEngine/XEngine.dll"
ConfigPath = "ScriptEngines/XEngine/XEngine.ini"
PerformanceRating = 3
DeprecationWarning = "XEngine is deprecated and will be removed in future versions"

[ExternalEngines]
;; External script engines loaded from addon-modules
EnableExternalEngines = true
ScanAddonModules = true
AddonModulesPath = "addon-modules"
AllowUnsignedModules = false
RequireModuleManifest = true

[Performance]
;; Performance monitoring and optimization settings
EnablePerformanceMonitoring = true
MetricsCollectionInterval = 60
EnableProfiling = true
ProfilingOutputPath = "logs/scripting_profiles"
EnableMemoryTracking = true
MemoryCheckInterval = 30
EnableExecutionTimeTracking = true

[Security]
;; Security settings for script execution
EnableSandboxing = true
RestrictFileAccess = true
RestrictNetworkAccess = false
AllowHTTPRequests = true
AllowEmailSending = true
MaxHTTPRequestsPerScript = 10
HTTPRequestRateLimit = "1 per second"
EnableScriptDigitalSignatures = false
RequireSignedScripts = false

[Debugging]
;; Debugging and development settings
EnableScriptDebugging = true
DebugOutputPath = "logs/script_debug"
EnableStepByStepExecution = false
EnableBreakpoints = false
EnableVariableInspection = true
DebugLogLevel = "Info"
SaveCompiledBytecode = true
BytecodePath = "cache/script_bytecode"

[Migration]
;; Script migration settings between engines
EnableAutomaticMigration = false
MigrationBackupPath = "backups/script_migration"
PreserveScriptState = true
MigrationTimeout = 300
EnableMigrationLogging = true
MigrationLogPath = "logs/script_migration"

[Compatibility]
;; Compatibility settings for legacy OpenSim installations
EnableOpenSimCompatibility = true
EmulateXEngineAPI = true
EmulateYEngineAPI = true
SupportLegacyScriptFormats = true
ConvertLegacyScripts = true
LegacyScriptBackupPath = "backups/legacy_scripts"

[Logging]
;; Logging configuration for script engines
LogLevel = "Info"
LogPath = "logs/scripting"
EnableFileLogging = true
EnableConsoleLogging = true
LogRotationSize = "10MB"
MaxLogFiles = 10
EnableStructuredLogging = true
LogFormat = "JSON"

;; Engine-specific sections can be added below
;; Example for a custom external engine:
;;
;; [CustomEngine]
;; Enabled = true
;; Priority = 50
;; ModulePath = "addon-modules/CustomEngine.dll"
;; ConfigPath = "ScriptEngines/CustomEngine/config.ini"
;; MaxScripts = 100
;; Description = "Custom script engine for specialized workloads"