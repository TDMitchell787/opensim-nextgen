;; YEngine Compatibility Configuration
;; This configuration provides compatibility with OpenSim YEngine scripts

[YEngine]
;; Enable YEngine compatibility layer
Enabled = false

;; YEngine script execution settings
ScriptEnginesPath = "ScriptEngines/YEngine"
ScriptDelayFactor = 1.0
ScriptDistanceLimitFactor = 1.0

;; Compilation settings
CompileWithDebugInformation = false
Verbose = false
AllowedCompilers = "lsl,vb,js,cs"
DefaultCompileLanguage = "lsl"

;; Resource limits
MaxScriptEventQueue = 300
MaxScriptExecutionTime = 30000
MaxScriptMemory = 524288
ScriptStackSize = 262144

;; LSL function compatibility
AllowGodFunctions = false
AllowOriginFunctions = false
AllowHigherLimits = false
AllowMODFunctions = true
AllowOSFunctions = false

;; Event handling
EventAbortOnScriptTimeout = true
KillTimedOutScripts = false
SaveBytecode = true
LoadBytecode = true

;; HTTP settings
AllowHTTPConnections = true
HTTPTimeout = 30000
HTTPMaxConnections = 8

;; Email settings
AllowEmailConnections = true
EmailMaxConnections = 4

;; Sensor settings
SensorMaxRange = 256.0
SensorMaxResults = 16

;; Physics settings
AllowLightShareFunctions = true
AllowLLCreateLink = false
AllowLLBreakLink = false
AllowLLBreakAllLinks = false

;; State persistence
SaveMinEventDelay = 0.01
MinTimerInterval = 0.5

;; Memory and performance
UseAsyncSaveLoad = true
MaxEventsPerSecond = 500
MinEventDelay = 0.001

;; Compatibility flags
YieldProlog = true
ScriptStopStrategy = "abort"
AppDomainLoading = false

;; Debug and logging
DebuggerSafe = false
WriteScriptSourceToDebugFile = false
DefaultLSLScriptEngine = "YEngine"

;; Advanced settings
UseSourceHashCode = true
UseXEngineStateFiles = false
YEngineLogLevel = "Info"
DeleteScriptsOnStartup = false

[LSL_Constants]
;; LSL constant definitions for YEngine compatibility
LSL_PI = 3.141592653589793
LSL_TWO_PI = 6.283185307179586
LSL_PI_BY_TWO = 1.570796326794897
LSL_DEG_TO_RAD = 0.017453292519943295
LSL_RAD_TO_DEG = 57.29577951308232
LSL_SQRT2 = 1.414213562373095

[YEngine_Functions]
;; YEngine-specific function configurations
;; Functions that require special handling in compatibility mode

;; HTTP functions
llHTTPRequest_MaxConnections = 8
llHTTPRequest_DefaultTimeout = 30000

;; Email functions  
llEmail_MaxConnections = 4
llEmail_DefaultTimeout = 30000

;; Timer functions
llSetTimerEvent_MinInterval = 0.5

;; Listen functions
llListen_MaxChannels = 64

;; Sensor functions
llSensor_MaxRange = 256.0
llSensor_MaxResults = 16

[Bytecode]
;; Bytecode compilation and caching settings
SaveBytecode = true
LoadBytecode = true
BytecodePath = "cache/yengine_bytecode"
CompressBytecode = true
BytecodeTimeout = 3600

[Migration]
;; Migration settings from XEngine to YEngine
EnableXEngineStateMigration = true
XEngineStateFilePath = "ScriptEngines/XEngine/ScriptStates"
MigrationBackupPath = "backups/yengine_migration"
PreserveXEngineStates = true

[Monitoring]
;; YEngine monitoring and statistics
EnableStatistics = true
StatisticsUpdateInterval = 60
EnablePerformanceCounters = true
LogExecutionTimes = true
LogMemoryUsage = true
LogEventQueues = true