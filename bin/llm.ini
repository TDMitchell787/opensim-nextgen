[HybridAI]
; Master switch for AI NPC system (true/false)
; When false, no AI NPCs will spawn and no LLM connections are made
enabled = false

; Enable NPC behavioral engine (wandering, patrolling, greeting)
; Requires enabled = false

behaviors_enabled = false

; Enable LLM-powered conversations (Ollama)
; When false, NPCs use canned keyword-matched responses only
llm_enabled = false

[LLM]
; Ollama endpoint URL
endpoint = http://localhost:11434

; Model name - must be pulled in Ollama first (ollama pull <model>)
; Popular options: llama3.2, mistral, codellama, phi3, gemma2
; llama4:maverick take Macos Sonoma
model = llama4:scout

; Request timeout in seconds
timeout = 30

; Maximum tokens in response
max_tokens = 2048

; Temperature (0.0 = deterministic, 1.0 = creative)
temperature = 0.7
