
[Startup]
; Opensim-next Standalone Configuration
; OpenSim Next - Production Grid Setup
; Administrator: Admin User
; Compatible with OpenSimulator configuration format

; Physics engine selection
physics = "ubODE"
; Options: Basic, ODE, UBODE, Bullet, POS

; Enable OSSL functions for advanced scripting
AllowOSFunctions = true
OSFunctionThreatLevel = VeryHigh

; Grid identification
GridName = "OpenSim Next Generation"
GridNick = "OpenSim-Next Grid"
WelcomeMessage = "Welcome to OpenSim Next Grid"

; Region configuration
region_file = "Regions/Regions.ini"
region_info_source = "filesystem"
regionload_regionsdir = "Regions"

; Database settings - PostgreSQL for testing
storage_connection_string = "Host=localhost;Database=opensim_db;Username=opensim;Password=CHANGEME"
storage_provider = "OpenSim.Data.PGSQL.dll"

; Asset configuration
AssetLoaderEnabled = true
DefaultAssetLoader = "OpenSim.Framework.AssetLoader.Filesystem.dll"
AssetLoaderArgs = "assets/AssetSets.xml"

; Network configuration
http_listener_port = 9000
ExternalHostNameForLSL = "127.0.0.1"

; Hypergrid configuration
HypergridLinkedRegions = false
Hypergrid = false
HomeURI = "http://127.0.0.1:9000"
GatekeeperURI = "http://127.0.0.1:9000"

; Performance settings for production grid 127.0.0.1
MaxAgents = 200
MaxPrims = 45000
NonPhysicalPrimMax = 32768
PhysicalPrimMax = 32768
ClampPrimSize = false

; Logging
LogLevel = INFO

; Performance
UseLLUDPServer = true
PacketPool = true

; Include additional configuration files
;Include-Common = "config-include/GridCommon.ini"
Include-Architecture = "config-include/Standalone.ini"
Include-osslDefaultEnable = "config-include/osslDefaultEnable.ini"

[Network]
; LLUDP configuration
port = 9000
public_port = 9000
http_listener_port = 9000

; SSL/TLS support
use_ssl = false
ssl_cert_path = ""
ssl_key_path = ""

[Hypergrid]
; Hypergrid configuration for inter-grid communication
Enabled = false
HomeURI = "http://127.0.0.1:9000"
;"http://127.0.0.1"
GatekeeperURI = "http://127.0.0.1:9000"
;"http://127.0.0.1:9000"

[Economy]
; Economy configuration
EconomyModule = ""
CurrencyServer = ""

[FreeSwitchVoice]
; Voice configuration
Enabled = false
ServerIp = "127.0.0.1"

[Groups]
; Groups configuration
Enabled = false
Module = "Default"

[Messaging]
; Message configuration
Module = "InstantMessageModule"

[DataSnapshot]
; Data snapshot configuration for search
index_sims = false

[Wind]
; Wind configuration
enabled = true
wind_plugin = "SimpleRandomWind"

[Cloud]
; Cloud configuration
enabled = true
cloud_plugin = "CloudModule"

[Trees]
; Tree configuration
enabled = true

[VectorRender]
; Vector render configuration
enabled = true

[TextureOnMapTile]
; Map tile configuration
enabled = true

[Architecture]
; OpenSim Next hybrid architecture
; Note: Include-Architecture already defined in [Startup] section