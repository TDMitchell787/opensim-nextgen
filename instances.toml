# =============================================================================
# CONFIGURATION REFERENCE
# =============================================================================
#
# Instance Fields:
#   id              - Unique identifier for this instance (required)
#   name            - Human-readable display name (required)
#   description     - Optional description
#   host            - Hostname or IP address (required)
#   websocket_port  - WebSocket server port (default: 9001)
#   admin_port      - Admin API port (default: 9200)
#   metrics_port    - Prometheus metrics port (default: 9100)
#   http_port       - HTTP/HTTPS server port (default: 9000)
#   udp_port        - UDP server port for viewers (default: 9000)
#   api_key         - Authentication key for this instance (required)
#   environment     - "development" | "staging" | "production"
#   auto_connect    - Connect automatically on dashboard startup
#   tags            - Array of tags for filtering/grouping
#
# Authentication Methods:
#   api_key         - Simple API key authentication (default)
#   jwt             - JSON Web Token authentication
#   mtls            - Mutual TLS with client certificates
#
# TLS Configuration:
#   enabled         - Enable TLS for WebSocket connections
#   ca_cert_path    - Path to CA certificate for verification
#   verify_host     - Verify server hostname matches certificate
#
# Environment Variables Override:
#   OPENSIM_INSTANCE_{ID}_API_KEY - Override API key for instance
#   OPENSIM_INSTANCE_{ID}_HOST    - Override host for instance
