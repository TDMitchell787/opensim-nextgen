# OpenSim Next Multi-Instance Configuration
# This file defines all OpenSim-next instances that the Flutter dashboard can manage
#
# Discovery Mode Options:
#   - "config"      : Use this file only (default)
#   - "multicast"   : Auto-discover instances on local network
#   - "consul"      : Use Consul service discovery
#   - "kubernetes"  : Use Kubernetes service discovery

[controller]
discovery_mode = "config"
health_check_interval_ms = 5000
heartbeat_timeout_ms = 15000
reconnect_delay_ms = 3000
max_reconnect_attempts = 5
command_timeout_ms = 30000
controller_port = 9300
instances_base_dir = "./Instances"
binary_path = ""

# =============================================================================
# INSTANCE DEFINITIONS
# =============================================================================
# Each [[instances]] block defines one OpenSim-next server to manage.
# The dashboard will connect to each instance's WebSocket port for real-time
# communication and control.

[[instances]]
id = "local-dev"
name = "Local Development"
description = "Local development server for testing"
host = "localhost"
websocket_port = 9001
admin_port = 9200
metrics_port = 9100
http_port = 9000
udp_port = 9000
api_key = "dev-api-key-change-me"
environment = "development"
auto_connect = true
tags = ["development", "local", "testing"]

[instances.authentication]
method = "api_key"              # "api_key" | "jwt" | "mtls"
# credentials_file = ""         # Optional: path to credentials file

[instances.tls]
enabled = false
# ca_cert_path = ""
# verify_host = true

