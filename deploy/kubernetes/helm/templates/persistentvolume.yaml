# OpenSim Next Persistent Volume Claims
# Provides persistent storage for data, assets, and logs

{{- if .Values.persistence.data.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "opensim-next.fullname" . }}-data
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: data-storage
  annotations:
    {{- with .Values.persistence.data.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    volume.kubernetes.io/storage-class: {{ include "opensim-next.storageClass" .Values.persistence.data | quote }}
spec:
  accessModes:
    - {{ .Values.persistence.data.accessMode | quote }}
  
  resources:
    requests:
      storage: {{ .Values.persistence.data.size | quote }}
  
  {{- $storageClass := include "opensim-next.storageClass" .Values.persistence.data }}
  {{- if $storageClass }}
  storageClassName: {{ $storageClass | quote }}
  {{- end }}
  
  {{- if .Values.persistence.data.selector }}
  selector:
    {{- toYaml .Values.persistence.data.selector | nindent 4 }}
  {{- end }}
  
  {{- if .Values.persistence.data.volumeName }}
  volumeName: {{ .Values.persistence.data.volumeName | quote }}
  {{- end }}

---
{{- end }}

