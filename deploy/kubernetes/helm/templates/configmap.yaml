# OpenSim Next Configuration Maps
# Contains application configuration and runtime settings

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opensim-next.fullname" . }}-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
  annotations:
    checksum/values: {{ .Values | toYaml | sha256sum }}
data:
  # Main OpenSim Next configuration file
  opensim-config.toml: |
    # OpenSim Next Production Configuration
    # Generated by Helm Chart for Kubernetes deployment
    
    [server]
    bind_address = "0.0.0.0"
    instance_id = "{{ .Values.opensim.env.OPENSIM_INSTANCE_ID | default (printf "%s-%s" .Release.Name .Release.Namespace) }}"
    api_key = "{{ .Values.opensim.env.OPENSIM_API_KEY }}"
    hostname = "{{ .Release.Name }}.{{ .Release.Namespace }}.svc.cluster.local"
    cluster_mode = true
    cluster_nodes = [
      {{- range $i := until (int .Values.opensim.replicaCount) }}
      "{{ include "opensim-next.fullname" $ }}-{{ $i }}.{{ include "opensim-next.fullname" $ }}-headless.{{ $.Release.Namespace }}.svc.cluster.local",
      {{- end }}
    ]
    
    [ports]
    viewer = {{ .Values.opensim.service.ports.viewer }}
    websocket = {{ .Values.opensim.service.ports.websocket }}
    web = {{ .Values.opensim.service.ports.web }}
    metrics = {{ .Values.opensim.service.ports.metrics }}
    hypergrid = {{ .Values.opensim.service.ports.hypergrid }}
    admin = {{ .Values.opensim.service.ports.admin }}
    
    [database]
    url = "{{ include "opensim-next.postgresql.url" . }}"
    max_connections = {{ .Values.opensim.env.DATABASE_MAX_CONNECTIONS | default 50 }}
    min_connections = 5
    timeout_seconds = 30
    retry_attempts = 3
    pool_timeout_seconds = 10
    enable_prepared_statements = true
    enable_connection_pooling = true
    log_slow_queries = true
    slow_query_threshold_ms = 1000
    
    [cache]
    redis_url = "{{ include "opensim-next.redis.url" . }}"
    redis_timeout_ms = 5000
    default_ttl_seconds = {{ .Values.opensim.env.CACHE_TTL_SECONDS | default 3600 }}
    max_memory_mb = {{ .Values.opensim.env.CACHE_SIZE_MB | default 512 }}
    eviction_policy = "lru"
    enable_asset_cache = true
    enable_user_cache = true
    enable_region_cache = true
    enable_inventory_cache = true
    
    [logging]
    level = "{{ .Values.opensim.env.RUST_LOG | default "info" }}"
    path = "/var/log/opensim-next"
    console_enabled = true
    file_enabled = true
    json_format = true
    include_timestamps = true
    max_file_size_mb = 100
    max_files = 10
    compress_old_files = true
    
    [logging.components]
    database = "info"
    network = "info"
    physics = "warn"
    scripting = "info"
    assets = "info"
    avatar = "info"
    social = "info"
    kubernetes = "info"
    
    [security]
    api_key_required = true
    require_https = {{ .Values.opensim.ingress.tls | ternary "true" "false" }}
    allowed_origins = {{ .Values.opensim.security.allowedOrigins | toJson }}
    cors_enabled = true
    rate_limit_enabled = true
    max_requests_per_minute = {{ .Values.opensim.env.RATE_LIMIT_RPM | default 1000 }}
    burst_size = 100
    rate_limit_by_ip = true
    session_timeout_minutes = 120
    max_failed_login_attempts = 5
    lockout_duration_minutes = 15
    validate_uploads = true
    max_upload_size_mb = 10
    allowed_file_types = ["png", "jpg", "jpeg", "gif", "wav", "ogg"]
    
    [performance]
    physics_engine = "{{ .Values.opensim.env.OPENSIM_DEFAULT_PHYSICS_ENGINE | default "ODE" }}"
    physics_threads = {{ .Values.opensim.performance.physicsThreads | default 4 }}
    physics_fps = {{ .Values.opensim.performance.physicsFPS | default 60 }}
    max_concurrent_users = {{ .Values.opensim.env.MAX_CONCURRENT_USERS | default 1000 }}
    max_regions_per_instance = {{ .Values.opensim.performance.maxRegions | default 100 }}
    max_objects_per_region = {{ .Values.opensim.performance.maxObjects | default 10000 }}
    heap_size_mb = {{ .Values.opensim.performance.heapSizeMB | default 1024 }}
    gc_threshold_mb = {{ .Values.opensim.performance.gcThresholdMB | default 512 }}
    enable_memory_profiling = {{ .Values.opensim.performance.enableProfiling | default false }}
    tcp_keepalive = true
    tcp_nodelay = true
    socket_timeout_seconds = 30
    max_packet_size = 65536
    
    [features]
    enable_viewer_protocol = true
    enable_websocket_protocol = true
    enable_web_interface = true
    enable_hypergrid = {{ .Values.opensim.features.hypergrid | default true }}
    enable_scripting = {{ .Values.opensim.features.scripting | default true }}
    enable_physics = {{ .Values.opensim.features.physics | default true }}
    enable_voice_chat = {{ .Values.opensim.features.voiceChat | default false }}
    enable_groups = {{ .Values.opensim.features.groups | default true }}
    enable_friends = {{ .Values.opensim.features.friends | default true }}
    enable_messaging = {{ .Values.opensim.features.messaging | default true }}
    enable_ai_features = {{ .Values.opensim.features.ai | default false }}
    enable_blockchain_assets = {{ .Values.opensim.features.blockchain | default false }}
    enable_edge_caching = {{ .Values.opensim.features.edgeCaching | default true }}
    
    [paths]
    data = "/var/lib/opensim-next"
    web = "/opt/opensim-next/web"
    assets = "/opt/opensim-next/assets"
    migrations = "/opt/opensim-next/migrations"
    plugins = "/opt/opensim-next/plugins"
    regions_path = "regions"
    inventory_path = "inventory"
    cache_path = "cache"
    backups_path = "backups"
    logs_path = "logs"
    
    [monitoring]
    health_check_enabled = true
    health_check_interval_seconds = 30
    health_check_timeout_seconds = 10
    prometheus_enabled = true
    metrics_path = "/metrics"
    detailed_metrics = true
    enable_profiling = {{ .Values.monitoring.profiling.enabled | default false }}
    profile_interval_seconds = {{ .Values.monitoring.profiling.interval | default 60 }}
    profile_duration_seconds = {{ .Values.monitoring.profiling.duration | default 30 }}
    cpu_threshold_percent = {{ .Values.monitoring.thresholds.cpu | default 80 }}
    memory_threshold_percent = {{ .Values.monitoring.thresholds.memory | default 85 }}
    disk_threshold_percent = {{ .Values.monitoring.thresholds.disk | default 90 }}
    response_time_threshold_ms = {{ .Values.monitoring.thresholds.responseTime | default 1000 }}
    
    [kubernetes]
    enabled = true
    namespace = "{{ .Release.Namespace }}"
    pod_name = "${KUBERNETES_POD_NAME}"
    pod_ip = "${KUBERNETES_POD_IP}"
    node_name = "${KUBERNETES_NODE_NAME}"
    service_name = "{{ include "opensim-next.fullname" . }}"
    deployment_name = "{{ include "opensim-next.fullname" . }}"
    
    [regions]
    default_region_size = {{ .Values.opensim.regions.defaultSize | default 256 }}
    max_region_size = {{ .Values.opensim.regions.maxSize | default 512 }}
    enable_mega_regions = {{ .Values.opensim.regions.enableMegaRegions | default true }}
    default_physics_engine = "{{ .Values.opensim.env.OPENSIM_DEFAULT_PHYSICS_ENGINE | default "ODE" }}"
    physics_auto_cleanup = true
    physics_thread_pool_size = {{ .Values.opensim.performance.physicsThreads | default 4 }}
    max_prims_per_region = {{ .Values.opensim.regions.maxPrims | default 15000 }}
    max_scripts_per_region = {{ .Values.opensim.regions.maxScripts | default 1000 }}
    max_avatars_per_region = {{ .Values.opensim.regions.maxAvatars | default 100 }}
    
    [hypergrid]
    enable_hypergrid = {{ .Values.opensim.features.hypergrid | default true }}
    grid_name = "{{ .Values.opensim.hypergrid.gridName | default "OpenSim Next Grid" }}"
    grid_description = "{{ .Values.opensim.hypergrid.gridDescription | default "Revolutionary Web-Enabled Virtual World" }}"
    welcome_message = "{{ .Values.opensim.hypergrid.welcomeMessage | default "Welcome to OpenSim Next!" }}"
    {{- $ingressHost := "" }}
    {{- if .Values.opensim.ingress.enabled }}
    {{- range .Values.opensim.ingress.hosts }}
    {{- $ingressHost = .host }}
    {{- break }}
    {{- end }}
    {{- end }}
    login_uri = "{{ if $ingressHost }}https://{{ $ingressHost }}/{{ else }}http://localhost:{{ .Values.opensim.service.ports.viewer }}/{{ end }}"
    gatekeeper_uri = "{{ if $ingressHost }}https://{{ $ingressHost }}:{{ .Values.opensim.service.ports.hypergrid }}/{{ else }}http://localhost:{{ .Values.opensim.service.ports.hypergrid }}/{{ end }}"
    user_agent_service = "{{ if $ingressHost }}https://{{ $ingressHost }}:{{ .Values.opensim.service.ports.hypergrid }}/{{ else }}http://localhost:{{ .Values.opensim.service.ports.hypergrid }}/{{ end }}"
    allow_foreign_users = {{ .Values.opensim.hypergrid.allowForeignUsers | default true }}
    require_verification = {{ .Values.opensim.hypergrid.requireVerification | default false }}
    max_foreign_users = {{ .Values.opensim.hypergrid.maxForeignUsers | default 1000 }}
    
    [economy]
    enable_economy = {{ .Values.opensim.economy.enabled | default true }}
    default_currency = "{{ .Values.opensim.economy.defaultCurrency | default "OpenSimCoins" }}"
    starting_balance = {{ .Values.opensim.economy.startingBalance | default 1000 }}
    enable_marketplace = {{ .Values.opensim.economy.marketplace | default true }}
    marketplace_fee_percent = {{ .Values.opensim.economy.marketplaceFee | default 5 }}
    enable_currency_exchange = {{ .Values.opensim.economy.currencyExchange | default false }}
    
    [backup]
    enable_auto_backup = {{ .Values.opensim.backup.enabled | default true }}
    backup_interval_hours = {{ .Values.opensim.backup.interval | default 24 }}
    backup_retention_days = {{ .Values.opensim.backup.retention | default 30 }}
    backup_regions = {{ .Values.opensim.backup.regions | default true }}
    backup_users = {{ .Values.opensim.backup.users | default true }}
    backup_inventory = {{ .Values.opensim.backup.inventory | default true }}
    backup_assets = {{ .Values.opensim.backup.assets | default false }}
    backup_compression = {{ .Values.opensim.backup.compression | default true }}
    backup_encryption = {{ .Values.opensim.backup.encryption | default false }}
    
    [development]
    debug_mode = {{ .Values.development.enabled | default false }}
    enable_console = {{ .Values.development.console | default false }}
    hot_reload = {{ .Values.development.hotReload | default false }}
    verbose_errors = {{ .Values.development.verboseErrors | default false }}
    enable_test_endpoints = {{ .Values.development.testEndpoints | default false }}
    allow_unsigned_scripts = {{ .Values.development.unsignedScripts | default false }}
    skip_asset_validation = {{ .Values.development.skipAssetValidation | default false }}

  # Environment-specific configuration
  environment: {{ .Values.global.environment | default "production" | quote }}
  
  # Kubernetes-specific settings
  kubernetes.yaml: |
    apiVersion: v1
    kind: Config
    current-context: opensim-next
    contexts:
    - name: opensim-next
      context:
        cluster: {{ .Values.global.clusterName | default "default" }}
        namespace: {{ .Release.Namespace }}
        user: opensim-next
    clusters:
    - name: {{ .Values.global.clusterName | default "default" }}
      cluster:
        server: https://kubernetes.default.svc
        certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    users:
    - name: opensim-next
      user:
        tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token

---
{{/* Log shipping configuration (if enabled) */}}
{{- if .Values.monitoring.logShipping.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opensim-next.fullname" . }}-promtail
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: log-shipping
data:
  config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    
    positions:
      filename: /tmp/positions.yaml
    
    clients:
      - url: {{ .Values.monitoring.logShipping.lokiUrl }}
        {{- if .Values.monitoring.logShipping.basicAuth.enabled }}
        basic_auth:
          username: {{ .Values.monitoring.logShipping.basicAuth.username }}
          password: {{ .Values.monitoring.logShipping.basicAuth.password }}
        {{- end }}
    
    scrape_configs:
      - job_name: opensim-next
        static_configs:
          - targets:
              - localhost
            labels:
              job: opensim-next
              instance: "{{ .Release.Name }}"
              namespace: "{{ .Release.Namespace }}"
              __path__: /var/log/opensim-next/*.log
        
        pipeline_stages:
          - json:
              expressions:
                timestamp: timestamp
                level: level
                message: message
                module: module
          
          - timestamp:
              source: timestamp
              format: RFC3339
          
          - labels:
              level:
              module:
          
          - output:
              source: message
{{- end }}