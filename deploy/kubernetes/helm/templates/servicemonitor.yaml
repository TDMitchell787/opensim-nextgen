# OpenSim Next ServiceMonitor
# Prometheus Operator configuration for metrics collection

{{- if and .Values.monitoring.serviceMonitor.enabled .Values.monitoring.prometheus.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "opensim-next.fullname" . }}
  namespace: {{ .Values.monitoring.serviceMonitor.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    {{- include "opensim-next.monitoring.labels" . | nindent 4 }}
    {{- with .Values.monitoring.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    meta.helm.sh/release-name: "{{ .Release.Name }}"
    meta.helm.sh/release-namespace: "{{ .Release.Namespace }}"
spec:
  # Service selector
  selector:
    matchLabels:
      {{- include "opensim-next.selectorLabels" . | nindent 6 }}
  
  # Namespace selector (if monitoring cross-namespace)
  {{- if .Values.monitoring.serviceMonitor.namespaceSelector }}
  namespaceSelector:
    {{- toYaml .Values.monitoring.serviceMonitor.namespaceSelector | nindent 4 }}
  {{- else }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  {{- end }}
  
  # Endpoints configuration
  endpoints:
    # Main metrics endpoint
    - port: metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout | default "10s" }}
      path: {{ .Values.monitoring.serviceMonitor.path | default "/metrics" }}
      scheme: http
      
      # HTTP headers for authentication
      {{- if .Values.opensim.env.OPENSIM_API_KEY }}
      headers:
        X-API-Key: {{ .Values.opensim.env.OPENSIM_API_KEY | quote }}
      {{- end }}
      
      # Metric relabeling
      metricRelabelings:
        # Add instance label
        - sourceLabels: [__address__]
          targetLabel: instance
          regex: '([^:]+)(?::\d+)?'
          replacement: '${1}'
        
        # Add application label
        - targetLabel: application
          replacement: opensim-next
        
        # Add environment label
        - targetLabel: environment
          replacement: {{ .Values.global.environment | default "production" }}
        
        # Add namespace label
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: kubernetes_namespace
        
        # Add pod name label
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: kubernetes_pod_name
        
        # Add service name label
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: kubernetes_service_name
      
      # Relabeling before scraping
      relabelings:
        # Keep only metrics from OpenSim Next pods
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          action: keep
          regex: {{ include "opensim-next.name" . }}
        
        # Add pod IP as a label
        - sourceLabels: [__meta_kubernetes_pod_ip]
          targetLabel: pod_ip
        
        # Add node name
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: kubernetes_node
        
        # Add phase label for deployment tracking
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_version]
          targetLabel: version
    
    # WebSocket metrics endpoint (if separate)
    {{- if .Values.opensim.service.ports.websocket }}
    - port: websocket
      interval: {{ .Values.monitoring.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout | default "10s" }}
      path: /metrics
      scheme: http
      
      metricRelabelings:
        - targetLabel: component
          replacement: websocket
        - targetLabel: protocol
          replacement: websocket
    {{- end }}
    
    # Admin metrics endpoint (internal)
    {{- if .Values.opensim.service.ports.admin }}
    - port: admin
      interval: {{ .Values.monitoring.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout | default "10s" }}
      path: /metrics
      scheme: http
      
      # Admin endpoint requires authentication
      {{- if .Values.opensim.env.OPENSIM_API_KEY }}
      headers:
        X-API-Key: {{ .Values.opensim.env.OPENSIM_API_KEY | quote }}
      {{- end }}
      
      metricRelabelings:
        - targetLabel: component
          replacement: admin
        - targetLabel: access_level
          replacement: internal
    {{- end }}
  
  # Job label for Prometheus
  jobLabel: {{ .Values.monitoring.serviceMonitor.jobLabel | default "opensim-next" }}
  
  # Target labels to add from service labels
  targetLabels:
    - app.kubernetes.io/name
    - app.kubernetes.io/instance
    - app.kubernetes.io/version
    - app.kubernetes.io/component

---
{{/* Additional ServiceMonitor for PostgreSQL (if enabled) */}}
{{- if and .Values.postgresql.enabled .Values.postgresql.metrics.enabled .Values.postgresql.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "opensim-next.fullname" . }}-postgresql
  namespace: {{ .Values.monitoring.serviceMonitor.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: postgresql-monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  
  endpoints:
    - port: http-metrics
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
      
      metricRelabelings:
        - targetLabel: application
          replacement: opensim-next
        - targetLabel: component
          replacement: postgresql
        - targetLabel: database_type
          replacement: postgresql

---
{{- end }}

{{/* Additional ServiceMonitor for Redis (if enabled) */}}
{{- if and .Values.redis.enabled .Values.redis.metrics.enabled .Values.redis.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "opensim-next.fullname" . }}-redis
  namespace: {{ .Values.monitoring.serviceMonitor.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: redis-monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  
  endpoints:
    - port: http-metrics
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
      
      metricRelabelings:
        - targetLabel: application
          replacement: opensim-next
        - targetLabel: component
          replacement: redis
        - targetLabel: cache_type
          replacement: redis

---
{{- end }}

{{/* PrometheusRule for OpenSim Next alerts */}}
{{- if .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "opensim-next.fullname" . }}-alerts
  namespace: {{ .Values.monitoring.serviceMonitor.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: alerting
spec:
  groups:
    - name: opensim-next.rules
      interval: 30s
      rules:
        # High CPU usage alert
        - alert: OpenSimNextHighCPU
          expr: rate(container_cpu_usage_seconds_total{pod=~"{{ include "opensim-next.fullname" . }}-.*"}[5m]) > 0.8
          for: 5m
          labels:
            severity: warning
            service: opensim-next
          annotations:
            summary: "OpenSim Next high CPU usage"
            description: "Pod {{ "{{ $labels.pod }}" }} has high CPU usage: {{ "{{ $value }}" }}%"
        
        # High memory usage alert
        - alert: OpenSimNextHighMemory
          expr: container_memory_usage_bytes{pod=~"{{ include "opensim-next.fullname" . }}-.*"} / container_spec_memory_limit_bytes > 0.9
          for: 5m
          labels:
            severity: warning
            service: opensim-next
          annotations:
            summary: "OpenSim Next high memory usage"
            description: "Pod {{ "{{ $labels.pod }}" }} has high memory usage: {{ "{{ $value }}" }}%"
        
        # Pod restart alert
        - alert: OpenSimNextPodRestarting
          expr: rate(kube_pod_container_status_restarts_total{pod=~"{{ include "opensim-next.fullname" . }}-.*"}[5m]) > 0
          for: 1m
          labels:
            severity: critical
            service: opensim-next
          annotations:
            summary: "OpenSim Next pod restarting"
            description: "Pod {{ "{{ $labels.pod }}" }} is restarting frequently"
        
        # High error rate alert
        - alert: OpenSimNextHighErrorRate
          expr: rate(opensim_http_requests_total{status=~"5.."}[5m]) / rate(opensim_http_requests_total[5m]) > 0.1
          for: 2m
          labels:
            severity: critical
            service: opensim-next
          annotations:
            summary: "OpenSim Next high error rate"
            description: "High error rate detected: {{ "{{ $value }}" }}% 5xx errors"
        
        # Database connection alert
        - alert: OpenSimNextDatabaseConnectionHigh
          expr: opensim_database_connections_active / opensim_database_connections_max > 0.8
          for: 3m
          labels:
            severity: warning
            service: opensim-next
          annotations:
            summary: "OpenSim Next database connections high"
            description: "Database connection usage is high: {{ "{{ $value }}" }}%"
        
        # WebSocket connection alert
        - alert: OpenSimNextWebSocketConnectionsHigh
          expr: opensim_websocket_connections_active > {{ .Values.monitoring.thresholds.maxWebSocketConnections | default 800 }}
          for: 2m
          labels:
            severity: warning
            service: opensim-next
          annotations:
            summary: "OpenSim Next WebSocket connections high"
            description: "High number of WebSocket connections: {{ "{{ $value }}" }}"
        
        # Active user threshold alert
        - alert: OpenSimNextHighUserLoad
          expr: opensim_active_users_total > {{ .Values.monitoring.thresholds.maxActiveUsers | default 800 }}
          for: 5m
          labels:
            severity: info
            service: opensim-next
          annotations:
            summary: "OpenSim Next high user load"
            description: "High number of active users: {{ "{{ $value }}" }}"
{{- end }}
{{- end }}