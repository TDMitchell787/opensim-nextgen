# OpenSim Next RBAC Configuration
# Role-Based Access Control for Kubernetes resources

{{- if .Values.rbac.create }}
---
# Service Account for OpenSim Next
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opensim-next.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: rbac
  annotations:
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: true

---
# Cluster Role for OpenSim Next (cluster-wide permissions)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "opensim-next.fullname" . }}-cluster-role
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: rbac
rules:
  # Node information (for monitoring and health checks)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  
  # Pod information (for service discovery and health)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  
  # Service information (for service mesh and networking)
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  
  # Metrics access (for Prometheus scraping)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  
  # Custom Resource Definitions (if using custom operators)
  {{- if .Values.opensim.customResources.enabled }}
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  {{- end }}

---
# Role for OpenSim Next (namespace-specific permissions)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opensim-next.fullname" . }}-role
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: rbac
rules:
  # ConfigMaps (for dynamic configuration)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  
  # Secrets (for credential management)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  
  # Services (for service discovery)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  
  # Pods (for health checks and logs)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]
  
  # Events (for debugging and monitoring)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create"]
  
  # Persistent Volumes (for storage management)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  
  # Deployments (for scaling and updates)
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch"]
  
  # Horizontal Pod Autoscalers (for scaling)
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  
  # Ingress (for external access management)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  
  # Network Policies (for security)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]

---
# Cluster Role Binding for OpenSim Next
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "opensim-next.fullname" . }}-cluster-binding
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: rbac
subjects:
  - kind: ServiceAccount
    name: {{ include "opensim-next.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "opensim-next.fullname" . }}-cluster-role
  apiGroup: rbac.authorization.k8s.io

---
# Role Binding for OpenSim Next
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opensim-next.fullname" . }}-binding
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: rbac
subjects:
  - kind: ServiceAccount
    name: {{ include "opensim-next.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "opensim-next.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io

---
{{/* Monitoring Service Account (separate for security) */}}
{{- if .Values.monitoring.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opensim-next.fullname" . }}-monitoring
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: monitoring-rbac
automountServiceAccountToken: true

---
# Monitoring Cluster Role (read-only access for metrics)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "opensim-next.fullname" . }}-monitoring-role
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: monitoring-rbac
rules:
  # Metrics and monitoring
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  
  # Non-resource URLs for metrics
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]

---
# Monitoring Cluster Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "opensim-next.fullname" . }}-monitoring-binding
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: monitoring-rbac
subjects:
  - kind: ServiceAccount
    name: {{ include "opensim-next.fullname" . }}-monitoring
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "opensim-next.fullname" . }}-monitoring-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}

---
{{/* Admin Service Account (elevated permissions) */}}
{{- if .Values.opensim.admin.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opensim-next.fullname" . }}-admin
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: admin-rbac
automountServiceAccountToken: true

---
# Admin Role (namespace admin permissions)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opensim-next.fullname" . }}-admin-role
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: admin-rbac
rules:
  # Full access to most resources in namespace
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["*"]
  
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["*"]
  
  - apiGroups: ["autoscaling"]
    resources: ["*"]
    verbs: ["*"]
  
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  
  # Restricted access to secrets (no delete)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
# Admin Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opensim-next.fullname" . }}-admin-binding
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: admin-rbac
subjects:
  - kind: ServiceAccount
    name: {{ include "opensim-next.fullname" . }}-admin
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "opensim-next.fullname" . }}-admin-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}

---
{{/* Backup Service Account (for backup operations) */}}
{{- if and .Values.opensim.backup.enabled .Values.opensim.backup.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opensim-next.fullname" . }}-backup
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: backup-rbac
automountServiceAccountToken: true

---
# Backup Role (read access for backup operations)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opensim-next.fullname" . }}-backup-role
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: backup-rbac
rules:
  # Read access to persistent volumes for backup
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  
  # Read access to pods for backup coordination
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  
  # Access to secrets for backup encryption
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
    resourceNames: ["{{ include "opensim-next.fullname" . }}-backup"]
  
  # Access to configmaps for backup configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
# Backup Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opensim-next.fullname" . }}-backup-binding
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "opensim-next.labels" . | nindent 4 }}
    component: backup-rbac
subjects:
  - kind: ServiceAccount
    name: {{ include "opensim-next.fullname" . }}-backup
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "opensim-next.fullname" . }}-backup-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}