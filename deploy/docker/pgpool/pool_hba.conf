# pool_hba.conf — pgpool-II Docker client authentication
# Phase 199.6 — OpenSim Next

# Local connections (Unix domain socket)
local   all         all                               trust

# IPv4 local connections
host    all         all         127.0.0.1/32          trust

# IPv6 local connections
host    all         all         ::1/128               trust

# Docker bridge network (172.16.0.0/12 covers all Docker networks)
host    all         all         172.16.0.0/12         trust

# Docker default bridge
host    all         all         192.168.0.0/16        trust

# Allow all (container-to-container within docker-compose network)
host    all         all         0.0.0.0/0             trust
