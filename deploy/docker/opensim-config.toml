# OpenSim Next Production Configuration Template
# This file will be dynamically generated by the entrypoint script
# based on environment variables

[server]
# Server identification
bind_address = "0.0.0.0"
instance_id = "opensim-production"
api_key = "change-me-in-production"

# Service discovery
hostname = "localhost"
cluster_mode = false
cluster_nodes = []

[ports]
# Core services
viewer = 9000        # Second Life Viewer Protocol
websocket = 9001     # WebSocket Server for Web Clients
web = 8080          # Web Interface
metrics = 9100      # Prometheus Metrics & Health API
hypergrid = 8002    # Hypergrid Protocol
admin = 9200        # Admin API (internal only)

[database]
# Database connection (will be set by environment variable)
url = "postgresql://opensim:password@localhost:5432/opensim"
max_connections = 50
min_connections = 5
timeout_seconds = 30
retry_attempts = 3
pool_timeout_seconds = 10

# Database performance
enable_prepared_statements = true
enable_connection_pooling = true
log_slow_queries = true
slow_query_threshold_ms = 1000

[cache]
# Redis configuration
redis_url = "redis://localhost:6379"
redis_password = ""
redis_db = 0
redis_timeout_ms = 5000

# Cache settings
default_ttl_seconds = 3600
max_memory_mb = 512
eviction_policy = "lru"

# Cache types
enable_asset_cache = true
enable_user_cache = true
enable_region_cache = true
enable_inventory_cache = true

[logging]
# Log levels: trace, debug, info, warn, error
level = "info"
path = "/var/log/opensim-next"

# Log outputs
console_enabled = true
file_enabled = true
json_format = true
include_timestamps = true

# Log rotation
max_file_size_mb = 100
max_files = 10
compress_old_files = true

# Component-specific logging
[logging.components]
database = "info"
network = "info"
physics = "warn"
scripting = "info"
assets = "info"
avatar = "info"
social = "info"

[security]
# API security
api_key_required = true
require_https = false  # Set to true in production with SSL termination
allowed_origins = ["*"]  # Restrict in production
cors_enabled = true

# Rate limiting
rate_limit_enabled = true
max_requests_per_minute = 1000
burst_size = 100
rate_limit_by_ip = true

# Authentication
session_timeout_minutes = 120
max_failed_login_attempts = 5
lockout_duration_minutes = 15

# Content security
validate_uploads = true
max_upload_size_mb = 10
allowed_file_types = ["png", "jpg", "jpeg", "gif", "wav", "ogg"]

[performance]
# Physics engine selection
physics_engine = "ODE"  # Options: ODE, UBODE, Bullet, POS, Basic
physics_threads = 4
physics_fps = 60

# Performance limits
max_concurrent_users = 1000
max_regions_per_instance = 100
max_objects_per_region = 10000

# Memory management
heap_size_mb = 1024
gc_threshold_mb = 512
enable_memory_profiling = false

# Network optimization
tcp_keepalive = true
tcp_nodelay = true
socket_timeout_seconds = 30
max_packet_size = 65536

[features]
# Protocol support
enable_viewer_protocol = true
enable_websocket_protocol = true
enable_web_interface = true
enable_hypergrid = true

# Advanced features
enable_scripting = true
enable_physics = true
enable_voice_chat = false
enable_groups = true
enable_friends = true
enable_messaging = true

# Experimental features
enable_ai_features = false
enable_blockchain_assets = false
enable_edge_caching = true

[paths]
# Application paths (set by container)
data = "/var/lib/opensim-next"
web = "/opt/opensim-next/web"
assets = "/opt/opensim-next/assets"
migrations = "/opt/opensim-next/migrations"
plugins = "/opt/opensim-next/plugins"

# Data subdirectories
regions_path = "regions"
inventory_path = "inventory"
cache_path = "cache"
backups_path = "backups"
logs_path = "logs"

[monitoring]
# Health checks
health_check_enabled = true
health_check_interval_seconds = 30
health_check_timeout_seconds = 10

# Metrics collection
prometheus_enabled = true
metrics_path = "/metrics"
detailed_metrics = true

# Performance monitoring
enable_profiling = false
profile_interval_seconds = 60
profile_duration_seconds = 30

# Alerting thresholds
cpu_threshold_percent = 80
memory_threshold_percent = 85
disk_threshold_percent = 90
response_time_threshold_ms = 1000

[regions]
# Default region configuration
default_region_size = 256
max_region_size = 512
enable_mega_regions = true

# Region physics
default_physics_engine = "ODE"
physics_auto_cleanup = true
physics_thread_pool_size = 4

# Region limits
max_prims_per_region = 15000
max_scripts_per_region = 1000
max_avatars_per_region = 100

[hypergrid]
# Hypergrid configuration
enable_hypergrid = true
grid_name = "OpenSim Next Grid"
grid_description = "Revolutionary Web-Enabled Virtual World"
welcome_message = "Welcome to OpenSim Next!"

# External services
login_uri = "http://localhost:9000/"
gatekeeper_uri = "http://localhost:8002/"
user_agent_service = "http://localhost:8002/"

# Security
allow_foreign_users = true
require_verification = false
max_foreign_users = 1000

[economy]
# Virtual economy
enable_economy = true
default_currency = "OpenSimCoins"
starting_balance = 1000

# Marketplace
enable_marketplace = true
marketplace_fee_percent = 5
enable_currency_exchange = false

[backup]
# Automatic backups
enable_auto_backup = true
backup_interval_hours = 24
backup_retention_days = 30

# Backup types
backup_regions = true
backup_users = true
backup_inventory = true
backup_assets = false  # Can be very large

# Backup storage
backup_compression = true
backup_encryption = false

[development]
# Development mode settings (disable in production)
debug_mode = false
enable_console = false
hot_reload = false
verbose_errors = false

# Development features
enable_test_endpoints = false
allow_unsigned_scripts = false
skip_asset_validation = false