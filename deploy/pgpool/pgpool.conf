# pgpool-II Configuration for OpenSim Grid
# Phase 199.1 — OpenSim Next HA Database Layer
# pgpool-II 4.7.1 + PostgreSQL 14.18
#
# Architecture:
#   OpenSim Next (18 regions) → pgpool-II (:9999) → PG Primary (:5432) + PG Standby (:5433)

#------------------------------------------------------------------------------
# CONNECTIONS
#------------------------------------------------------------------------------

listen_addresses = 'localhost'
port = 9999
socket_dir = '/tmp'
pcp_listen_addresses = 'localhost'
pcp_port = 9898
pcp_socket_dir = '/tmp'

#------------------------------------------------------------------------------
# BACKEND CLUSTERING MODE
#------------------------------------------------------------------------------

backend_clustering_mode = 'streaming_replication'

#------------------------------------------------------------------------------
# BACKEND DEFINITIONS
#------------------------------------------------------------------------------

# Primary (read/write)
backend_hostname0 = 'localhost'
backend_port0 = 5432
backend_weight0 = 1
backend_data_directory0 = '/usr/local/var/postgres'
backend_flag0 = 'ALLOW_TO_FAILOVER'
backend_application_name0 = 'gaia_primary'

# Standby (read-only, streaming replication from primary)
# Uncomment and create standby with: pg_basebackup -h localhost -p 5432 -U opensim -D /usr/local/var/postgresql@14_standby -R -P --checkpoint=fast
# Then set port=5433 in standby's postgresql.auto.conf and start with pg_ctl
# After starting, attach to pgpool with: pgpool-ctl.sh attach 1
#backend_hostname1 = 'localhost'
#backend_port1 = 5433
#backend_weight1 = 1
#backend_data_directory1 = '/usr/local/var/postgresql@14_standby'
#backend_flag1 = 'ALLOW_TO_FAILOVER'
#backend_application_name1 = 'gaia_standby'

#------------------------------------------------------------------------------
# AUTHENTICATION
#------------------------------------------------------------------------------

enable_pool_hba = on
pool_passwd = 'pool_passwd'
authentication_timeout = 30
allow_clear_text_frontend_auth = off

#------------------------------------------------------------------------------
# CONNECTION POOLING
#------------------------------------------------------------------------------

# 18 region instances × ~3 connections each = ~54, rounded up with headroom
# Requires: sudo sysctl -w kern.sysv.shmmax=167772160 kern.sysv.shmall=40960
num_init_children = 64
max_pool = 4
child_life_time = 300
child_max_connections = 0
connection_life_time = 600
client_idle_limit = 0
reserved_connections = 2

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------

log_destination = 'stderr'
logging_collector = on
log_directory = '/usr/local/var/pgpool_logs'
log_filename = 'pgpool-%Y-%m-%d.log'
log_truncate_on_rotation = on
log_rotation_age = 1d
log_rotation_size = 10MB

log_client_messages = off
log_hostname = off
log_statement = off
log_per_node_statement = off
log_standby_delay = 'if_over_threshold'
log_min_messages = warning

#------------------------------------------------------------------------------
# LOAD BALANCING
#------------------------------------------------------------------------------

load_balance_mode = on
ignore_leading_white_space = on
read_only_function_list = ''
write_function_list = ''
primary_routing_query_pattern_list = ''
database_redirect_preference_list = ''
app_name_redirect_preference_list = ''
allow_sql_comments = off
disable_load_balance_on_write = 'transaction'
statement_level_load_balance = on
sr_check_period = 10
sr_check_user = 'opensim'
sr_check_password = ''
sr_check_database = 'gaiagrid'
delay_threshold = 10000000

#------------------------------------------------------------------------------
# HEALTH CHECK
#------------------------------------------------------------------------------

health_check_period = 10
health_check_timeout = 20
health_check_user = 'opensim'
health_check_password = ''
health_check_database = 'gaiagrid'
health_check_max_retries = 3
health_check_retry_delay = 1
connect_timeout = 10000

#------------------------------------------------------------------------------
# FAILOVER AND FAILBACK
#------------------------------------------------------------------------------

failover_command = '/opt/opensim %d %h %p %D %m %H %M %P %r %R %N %S'
failback_command = ''
failover_on_backend_error = on
failover_on_backend_shutdown = off
detach_false_primary = off
search_primary_node_timeout = 300
auto_failback = off
auto_failback_interval = 1min

#------------------------------------------------------------------------------
# ONLINE RECOVERY (manual standby rebuild)
#------------------------------------------------------------------------------

recovery_user = 'opensim'
recovery_password = ''
recovery_1st_stage_command = ''
recovery_2nd_stage_command = ''
recovery_timeout = 90
client_idle_limit_in_recovery = 0

#------------------------------------------------------------------------------
# WATCHDOG (disabled — single pgpool node for now)
#------------------------------------------------------------------------------

use_watchdog = off

#------------------------------------------------------------------------------
# OTHERS
#------------------------------------------------------------------------------

relcache_expire = 3600
relcache_size = 256
check_temp_table = catalog
check_unlogged_table = on
enable_shared_relcache = on

#------------------------------------------------------------------------------
# IN MEMORY QUERY CACHE (disabled — Valkey handles L1 caching)
#------------------------------------------------------------------------------

memory_cache_enabled = off

#------------------------------------------------------------------------------
# FILE LOCATIONS
#------------------------------------------------------------------------------

pid_file_name = '/usr/local/var/pgpool-ii/pgpool.pid'
logdir = '/usr/local/var/pgpool_logs'
