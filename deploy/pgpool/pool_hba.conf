# pool_hba.conf — pgpool-II client authentication
# Phase 199.1 — Gaia Grid
#
# Mirrors PostgreSQL pg_hba.conf for pgpool connections
# Format: TYPE DATABASE USER ADDRESS METHOD

# Local connections (Unix domain socket)
local   all         all                               trust

# IPv4 local connections
host    all         all         127.0.0.1/32          trust

# IPv6 local connections
host    all         all         ::1/128               trust

# Docker network (for future containerized deployment)
#host    all         all         172.16.0.0/12         md5
