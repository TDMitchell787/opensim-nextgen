# OpenSim Next - Production Deployment Pipeline
# Phase 29.5: CI/CD Pipeline Integration with Automated Deployment
name: Production Deployment

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      force_deploy:
        description: 'Force deployment even if tests fail'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RUST_VERSION: '1.70'
  ZIG_VERSION: '0.14.0'

jobs:
  # Security and vulnerability scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: rust

  # Build and test pipeline
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: ${{ matrix.target }}
          override: true
          components: rustfmt, clippy

      - name: Setup Zig toolchain
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Cache Zig dependencies
        uses: actions/cache@v3
        with:
          path: |
            zig-cache
            zig-out
          key: ${{ runner.os }}-zig-${{ env.ZIG_VERSION }}-${{ hashFiles('**/build.zig') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libpq-dev \
            libsqlite3-dev \
            pkg-config \
            build-essential

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: opensim-next/rust

      - name: Run Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: opensim-next/rust

      - name: Build Zig components
        run: zig build -Doptimize=ReleaseFast
        working-directory: opensim-next/zig

      - name: Build Rust components
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: opensim-next/rust
        env:
          RUSTFLAGS: '-C target-cpu=native'

      - name: Run Rust tests
        run: cargo test --release --all-features
        working-directory: opensim-next/rust
        env:
          RUST_LOG: debug

      - name: Run integration tests
        run: cargo test --release --test '*' --all-features
        working-directory: opensim-next/rust

      - name: Run Phase 28 testing suite
        run: |
          chmod +x opensim-next/rust/tools/phase28-testing/run-all-tests.sh
          opensim-next/rust/tools/phase28-testing/run-all-tests.sh --ci-mode
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/opensim_test"

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-${{ matrix.target }}
          path: |
            opensim-next/rust/target/*/deps/opensim_next-*.xml
            opensim-next/rust/test-results/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: opensim-next-${{ matrix.target }}
          path: |
            opensim-next/rust/target/${{ matrix.target }}/release/opensim-next
            opensim-next/zig/zig-out/lib/

  # Build Docker images
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [security-scan, build-and-test]
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: opensim-next
          file: opensim-next/deploy/docker/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            RUST_VERSION=${{ env.RUST_VERSION }}
            ZIG_VERSION=${{ env.ZIG_VERSION }}

      - name: Run container security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'docker-trivy-results.sarif'

      - name: Upload Docker scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'docker-trivy-results.sarif'

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.opensim.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Configure kubectl context
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          kubectl config set-context --current --namespace=opensim-next-staging

      - name: Deploy with Helm
        run: |
          helm upgrade --install opensim-next-staging ./deploy/kubernetes/helm \
            --namespace opensim-next-staging \
            --create-namespace \
            --values ./deploy/config/environments/staging.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set global.environment=staging \
            --wait --timeout=600s

      - name: Run deployment validation
        run: |
          chmod +x ./deploy/scripts/validate-deployment.sh
          ./deploy/scripts/validate-deployment.sh staging opensim-next-staging

      - name: Run health checks
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=opensim-next -n opensim-next-staging --timeout=300s
          kubectl exec -n opensim-next-staging deployment/opensim-next-staging -- /app/health-check.sh

      - name: Update deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Staging deployment successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Staging deployment failed" >> $GITHUB_STEP_SUMMARY
          fi

  # Deploy to production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: |
      (github.ref == 'refs/heads/main' && needs.deploy-staging.result == 'success') ||
      (github.event.inputs.environment == 'production' && 
       (needs.deploy-staging.result == 'success' || github.event.inputs.force_deploy == 'true'))
    environment:
      name: production
      url: https://opensim.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Configure kubectl context
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          kubectl config set-context --current --namespace=opensim-next

      - name: Create backup before deployment
        run: |
          chmod +x ./deploy/scripts/backup-database.sh
          ./deploy/scripts/backup-database.sh production

      - name: Deploy with Helm (Blue-Green)
        run: |
          # Deploy to green environment first
          helm upgrade --install opensim-next-green ./deploy/kubernetes/helm \
            --namespace opensim-next \
            --values ./deploy/config/environments/production-optimized.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set global.environment=production \
            --set nameOverride=opensim-next-green \
            --wait --timeout=900s

      - name: Run production validation
        run: |
          chmod +x ./deploy/scripts/validate-deployment.sh
          ./deploy/scripts/validate-deployment.sh production opensim-next

      - name: Run comprehensive health checks
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=opensim-next-green -n opensim-next --timeout=600s
          
          # Run all Phase 28 tests against production
          chmod +x ./opensim-next/rust/tools/phase28-testing/run-all-tests.sh
          ./opensim-next/rust/tools/phase28-testing/run-all-tests.sh --production-mode --target=opensim-next-green

      - name: Switch traffic (Blue-Green deployment)
        run: |
          # Update main service to point to green deployment
          kubectl patch service opensim-next -n opensim-next \
            -p '{"spec":{"selector":{"app.kubernetes.io/instance":"opensim-next-green"}}}'
          
          # Wait for traffic switch
          sleep 30
          
          # Validate traffic switch
          kubectl exec -n opensim-next deployment/opensim-next-green -- /app/health-check.sh

      - name: Cleanup old deployment
        run: |
          # Remove blue deployment after successful green deployment
          helm uninstall opensim-next-blue -n opensim-next || true

      - name: Update production deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🚀 Production deployment successful" >> $GITHUB_STEP_SUMMARY
            echo "Environment: https://opensim.example.com" >> $GITHUB_STEP_SUMMARY
          else
            echo "💥 Production deployment failed" >> $GITHUB_STEP_SUMMARY
            # Rollback on failure
            kubectl patch service opensim-next -n opensim-next \
              -p '{"spec":{"selector":{"app.kubernetes.io/instance":"opensim-next-blue"}}}' || true
          fi

  # Post-deployment monitoring
  post-deployment-monitoring:
    name: Post-Deployment Monitoring
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always() && needs.deploy-production.result == 'success'
    
    steps:
      - name: Setup monitoring
        run: |
          echo "Setting up post-deployment monitoring..."
          
          # Wait for metrics to stabilize
          sleep 120
          
          # Check critical metrics
          curl -s "https://opensim.example.com/metrics" | grep -E "(opensim_active_connections|cpu_usage_percent|memory_usage_percent)"

      - name: Send deployment notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: |
            🎉 OpenSim Next Production Deployment Complete!
            
            📊 Status: ${{ needs.deploy-production.result }}
            🔗 Environment: https://opensim.example.com
            📝 Commit: ${{ github.sha }}
            👤 Deployed by: ${{ github.actor }}
            
            🚀 Revolutionary virtual world server is live!
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Cleanup and artifact management
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-production, post-deployment-monitoring]
    if: always()
    
    steps:
      - name: Cleanup old artifacts
        run: |
          echo "Cleaning up deployment artifacts..."
          # Cleanup handled by GitHub Actions retention policies
          echo "✅ Cleanup completed"

      - name: Update deployment metrics
        run: |
          echo "📊 Deployment completed at $(date)"
          echo "🎯 Phase 29.5: CI/CD Pipeline Integration - COMPLETED"