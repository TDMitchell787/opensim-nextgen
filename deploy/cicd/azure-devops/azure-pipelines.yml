# Azure DevOps Pipeline for OpenSim Next
# Comprehensive CI/CD pipeline for Microsoft Azure environments

trigger:
  branches:
    include:
    - main
    - develop
    - release/*
    - feature/*
  tags:
    include:
    - v*

pr:
  branches:
    include:
    - main
    - develop

variables:
  RUST_VERSION: '1.75'
  ZIG_VERSION: '0.14.0'
  REGISTRY: 'opensimacr.azurecr.io'
  IMAGE_NAME: 'opensim-next'
  RUST_BACKTRACE: '1'
  DOCKER_BUILDKIT: '1'

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Preflight
  displayName: 'Preflight Checks'
  jobs:
  - job: DetectChanges
    displayName: 'Detect Changes'
    steps:
    - checkout: self
      fetchDepth: 2
    
    - bash: |
        set -e
        
        # Generate version
        if [[ "$BUILD_SOURCEBRANCH" == "refs/tags/"* ]]; then
          VERSION=${BUILD_SOURCEBRANCH#refs/tags/}
        elif [[ "$BUILD_SOURCEBRANCH" == "refs/heads/main" ]]; then
          VERSION=$(date +%Y%m%d)-$(echo $BUILD_SOURCEVERSION | cut -c1-8)
        else
          VERSION=$(echo $BUILD_SOURCEBRANCH | sed 's/refs\/heads\///')-$(date +%Y%m%d)-$(echo $BUILD_SOURCEVERSION | cut -c1-8)
        fi
        echo "##vso[task.setvariable variable=VERSION;isOutput=true]$VERSION"
        
        # Detect changes
        if git diff --name-only HEAD~1 HEAD | grep -q 'opensim-next/rust\|Cargo'; then
          echo "##vso[task.setvariable variable=RUST_CHANGED;isOutput=true]true"
        else
          echo "##vso[task.setvariable variable=RUST_CHANGED;isOutput=true]false"
        fi
        
        if git diff --name-only HEAD~1 HEAD | grep -q 'opensim-next/zig\|build.zig'; then
          echo "##vso[task.setvariable variable=ZIG_CHANGED;isOutput=true]true"
        else
          echo "##vso[task.setvariable variable=ZIG_CHANGED;isOutput=true]false"
        fi
        
        if git diff --name-only HEAD~1 HEAD | grep -q 'opensim-next/deploy/docker\|Dockerfile'; then
          echo "##vso[task.setvariable variable=DOCKER_CHANGED;isOutput=true]true"
        else
          echo "##vso[task.setvariable variable=DOCKER_CHANGED;isOutput=true]false"
        fi
        
        echo "Version: $VERSION"
        echo "Rust changed: $([ -n "$(git diff --name-only HEAD~1 HEAD | grep 'opensim-next/rust\|Cargo')" ] && echo 'true' || echo 'false')"
        echo "Zig changed: $([ -n "$(git diff --name-only HEAD~1 HEAD | grep 'opensim-next/zig\|build.zig')" ] && echo 'true' || echo 'false')"
        echo "Docker changed: $([ -n "$(git diff --name-only HEAD~1 HEAD | grep 'opensim-next/deploy/docker\|Dockerfile')" ] && echo 'true' || echo 'false')"
      name: changes
      displayName: 'Detect Changes'

- stage: Build
  displayName: 'Build & Test'
  dependsOn: Preflight
  variables:
    VERSION: $[ stageDependencies.Preflight.DetectChanges.outputs['changes.VERSION'] ]
    RUST_CHANGED: $[ stageDependencies.Preflight.DetectChanges.outputs['changes.RUST_CHANGED'] ]
    ZIG_CHANGED: $[ stageDependencies.Preflight.DetectChanges.outputs['changes.ZIG_CHANGED'] ]
    DOCKER_CHANGED: $[ stageDependencies.Preflight.DetectChanges.outputs['changes.DOCKER_CHANGED'] ]
  jobs:
  - job: RustPipeline
    displayName: 'Rust Build & Test'
    condition: or(eq(variables.RUST_CHANGED, 'true'), eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
    steps:
    - checkout: self
    
    - task: Cache@2
      inputs:
        key: 'cargo | "$(Agent.OS)" | opensim-next/rust/Cargo.lock'
        restoreKeys: |
          cargo | "$(Agent.OS)"
          cargo
        path: $(CARGO_HOME)
      displayName: 'Cache Cargo'
    
    - bash: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain $(RUST_VERSION)
        source $HOME/.cargo/env
        rustup component add rustfmt clippy
        rustc --version
        cargo --version
      displayName: 'Install Rust'
    
    - bash: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libssl-dev libpq-dev postgresql-client
      displayName: 'Install System Dependencies'
    
    - bash: |
        source $HOME/.cargo/env
        cd opensim-next/rust
        cargo fmt --all -- --check
      displayName: 'Check Rust Formatting'
    
    - bash: |
        source $HOME/.cargo/env
        cd opensim-next/rust
        cargo clippy --all-targets --all-features -- -D warnings
      displayName: 'Run Clippy Lints'
    
    - bash: |
        source $HOME/.cargo/env
        cargo install cargo-audit
        cd opensim-next/rust
        cargo audit --deny warnings
      displayName: 'Security Audit'
    
    - bash: |
        source $HOME/.cargo/env
        cd opensim-next/rust
        cargo build --verbose --all-features
        cargo build --verbose --release --all-features
      displayName: 'Build Rust Code'
    
    - bash: |
        source $HOME/.cargo/env
        cd opensim-next/rust
        cargo test --verbose --all-features
      displayName: 'Run Rust Tests'
    
    - task: PublishTestResults@2
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'opensim-next/rust/target/test-results.xml'
        mergeTestResults: true
        failTaskOnFailedTests: true
      displayName: 'Publish Test Results'
    
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: 'opensim-next/rust/target/release/opensim-next'
        artifactName: 'rust-binary'
      displayName: 'Publish Rust Binary'

  - job: ZigPipeline
    displayName: 'Zig Build & Test'
    condition: or(eq(variables.ZIG_CHANGED, 'true'), eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
    steps:
    - checkout: self
    
    - bash: |
        sudo apt-get update
        sudo apt-get install -y curl xz-utils build-essential
        curl -L https://ziglang.org/download/$(ZIG_VERSION)/zig-linux-x86_64-$(ZIG_VERSION).tar.xz | tar -xJ
        sudo mv zig-linux-x86_64-$(ZIG_VERSION) /usr/local/zig
        export PATH=/usr/local/zig:$PATH
        zig version
      displayName: 'Install Zig'
    
    - bash: |
        export PATH=/usr/local/zig:$PATH
        cd opensim-next/zig
        zig fmt --check src/
      displayName: 'Check Zig Formatting'
    
    - bash: |
        export PATH=/usr/local/zig:$PATH
        cd opensim-next/zig
        zig build
        zig build -Doptimize=ReleaseFast
      displayName: 'Build Zig Code'
    
    - bash: |
        export PATH=/usr/local/zig:$PATH
        cd opensim-next/zig
        zig build test
      displayName: 'Run Zig Tests'
    
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: 'opensim-next/zig/zig-out'
        artifactName: 'zig-artifacts'
      displayName: 'Publish Zig Artifacts'

- stage: Security
  displayName: 'Security Scanning'
  dependsOn: Preflight
  jobs:
  - job: SecurityScan
    displayName: 'Security Scan'
    steps:
    - checkout: self
    
    - task: trivy@1
      inputs:
        version: 'latest'
        scanType: 'fs'
        targetPath: '.'
        format: 'sarif'
        outputFile: 'trivy-results.sarif'
      displayName: 'Trivy Filesystem Scan'
    
    - task: PublishSecurityAnalysisLogs@3
      inputs:
        artifactName: 'CodeAnalysisLogs'
        allTools: true
        toolLogsNotFoundAction: 'Standard'
      displayName: 'Publish Security Results'

- stage: Package
  displayName: 'Package & Push'
  dependsOn: [Build, Security]
  condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
  variables:
    VERSION: $[ stageDependencies.Preflight.DetectChanges.outputs['changes.VERSION'] ]
  jobs:
  - job: Docker
    displayName: 'Docker Build & Push'
    steps:
    - checkout: self
    
    - task: DownloadPipelineArtifact@2
      inputs:
        artifactName: 'rust-binary'
        targetPath: '$(Pipeline.Workspace)/rust-binary'
      displayName: 'Download Rust Binary'
    
    - task: DownloadPipelineArtifact@2
      inputs:
        artifactName: 'zig-artifacts'
        targetPath: '$(Pipeline.Workspace)/zig-artifacts'
      displayName: 'Download Zig Artifacts'
    
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'azure-subscription'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(echo $REGISTRY | cut -d'.' -f1)
          
          # Build image
          docker build \
            --tag $REGISTRY/$IMAGE_NAME:$(VERSION) \
            --tag $REGISTRY/$IMAGE_NAME:latest \
            --file opensim-next/deploy/docker/Dockerfile.production \
            --build-arg VERSION=$(VERSION) \
            --build-arg BUILD_DATE=$(date -Iseconds) \
            --build-arg VCS_REF=$(Build.SourceVersion) \
            opensim-next/
          
          # Push images
          docker push $REGISTRY/$IMAGE_NAME:$(VERSION)
          docker push $REGISTRY/$IMAGE_NAME:latest
      displayName: 'Build & Push Docker Image'
    
    - task: trivy@1
      inputs:
        version: 'latest'
        scanType: 'image'
        image: '$(REGISTRY)/$(IMAGE_NAME):$(VERSION)'
        format: 'sarif'
        outputFile: 'trivy-container-results.sarif'
      displayName: 'Trivy Container Scan'

- stage: IntegrationTest
  displayName: 'Integration Tests'
  dependsOn: Package
  condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
  jobs:
  - job: IntegrationTests
    displayName: 'Integration Tests'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: opensim_test
          POSTGRES_USER: opensim
          POSTGRES_PASSWORD: opensim_test_password
        ports:
          5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    
    variables:
      DATABASE_URL: 'postgresql://opensim:opensim_test_password@localhost:5432/opensim_test'
      REDIS_URL: 'redis://localhost:6379'
    
    steps:
    - checkout: self
    
    - bash: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain $(RUST_VERSION)
        source $HOME/.cargo/env
        sudo apt-get update
        sudo apt-get install -y pkg-config libssl-dev libpq-dev postgresql-client redis-tools
      displayName: 'Setup Environment'
    
    - bash: |
        # Wait for services
        until pg_isready -h localhost -p 5432 -U opensim; do sleep 1; done
        until redis-cli -h localhost ping; do sleep 1; done
        
        source $HOME/.cargo/env
        cd opensim-next/rust
        cargo test --test integration_tests --all-features -- --test-threads=1
      displayName: 'Run Integration Tests'

- stage: Deploy
  displayName: 'Deploy'
  dependsOn: [Package, IntegrationTest]
  condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
  variables:
    VERSION: $[ stageDependencies.Preflight.DetectChanges.outputs['changes.VERSION'] ]
  jobs:
  - deployment: DeployStaging
    displayName: 'Deploy to Staging'
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    environment: 'opensim-staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          - task: KubectlInstaller@0
            inputs:
              kubectlVersion: '1.28.0'
            displayName: 'Install kubectl'
          
          - task: HelmInstaller@1
            inputs:
              helmVersionToInstall: '3.13.0'
            displayName: 'Install Helm'
          
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'azure-subscription'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Get AKS credentials
                az aks get-credentials --resource-group opensim-rg --name opensim-staging-cluster
                
                # Deploy to staging
                helm upgrade --install opensim-next-staging \
                  opensim-next/deploy/kubernetes/helm \
                  --namespace opensim-next-staging \
                  --create-namespace \
                  --values opensim-next/deploy/kubernetes/helm/values.yaml \
                  --values opensim-next/deploy/config/environments/staging.yaml \
                  --set image.tag=$(VERSION) \
                  --set environment=staging \
                  --wait --timeout=15m
                
                kubectl rollout status deployment/opensim-next-staging \
                  -n opensim-next-staging --timeout=600s
            displayName: 'Deploy to Staging'

  - deployment: DeployProduction
    displayName: 'Deploy to Production'
    condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/')
    environment: 'opensim-production'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          - task: KubectlInstaller@0
            inputs:
              kubectlVersion: '1.28.0'
            displayName: 'Install kubectl'
          
          - task: HelmInstaller@1
            inputs:
              helmVersionToInstall: '3.13.0'
            displayName: 'Install Helm'
          
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'azure-subscription'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Get AKS credentials
                az aks get-credentials --resource-group opensim-rg --name opensim-production-cluster
                
                # Blue-Green deployment
                CURRENT_COLOR=$(kubectl get service opensim-next-active -n opensim-next -o jsonpath='{.spec.selector.color}' 2>/dev/null || echo "blue")
                NEW_COLOR=$([ "$CURRENT_COLOR" = "blue" ] && echo "green" || echo "blue")
                
                echo "Deploying to $NEW_COLOR environment"
                
                helm upgrade --install opensim-next-$NEW_COLOR \
                  opensim-next/deploy/kubernetes/helm \
                  --namespace opensim-next \
                  --create-namespace \
                  --values opensim-next/deploy/kubernetes/helm/values.yaml \
                  --values opensim-next/deploy/config/environments/production.yaml \
                  --set image.tag=$(VERSION) \
                  --set environment=production \
                  --set color=$NEW_COLOR \
                  --wait --timeout=20m
                
                kubectl rollout status deployment/opensim-next-$NEW_COLOR \
                  -n opensim-next --timeout=900s
                
                # Switch traffic
                kubectl patch service opensim-next-active -n opensim-next \
                  -p "{\"spec\":{\"selector\":{\"color\":\"$NEW_COLOR\"}}}"
                
                echo "Production deployment completed. Active color: $NEW_COLOR"
            displayName: 'Deploy to Production'

- stage: Release
  displayName: 'Create Release'
  dependsOn: Deploy
  condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
  variables:
    VERSION: $[ stageDependencies.Preflight.DetectChanges.outputs['changes.VERSION'] ]
  jobs:
  - job: CreateRelease
    displayName: 'Create GitHub Release'
    steps:
    - checkout: self
      fetchDepth: 0
    
    - task: HelmInstaller@1
      inputs:
        helmVersionToInstall: '3.13.0'
      displayName: 'Install Helm'
    
    - bash: |
        # Package Helm chart
        helm package opensim-next/deploy/kubernetes/helm \
          --version $(VERSION) \
          --app-version $(VERSION)
        
        # Generate changelog
        if git describe --tags --abbrev=0 HEAD~1 >/dev/null 2>&1; then
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1)
          git log $PREV_TAG..HEAD --oneline --pretty=format:"- %s" > CHANGELOG.md
        else
          echo "- Initial release" > CHANGELOG.md
        fi
      displayName: 'Prepare Release Assets'
    
    - task: GitHubRelease@1
      inputs:
        gitHubConnection: 'github-connection'
        repositoryName: '$(Build.Repository.Name)'
        action: 'create'
        target: '$(Build.SourceVersion)'
        tagSource: 'gitTag'
        releaseNotesSource: 'filePath'
        releaseNotesFilePath: 'CHANGELOG.md'
        assets: 'opensim-next-$(VERSION).tgz'
        isDraft: false
        isPreRelease: false
      displayName: 'Create GitHub Release'