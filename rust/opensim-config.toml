# OpenSim Next Configuration File
# Permanent configuration that eliminates path searching

[database]
# PostgreSQL configuration for opensim-next
url = "postgresql://opensim@localhost/opensim_db"
auto_migrate = true
auto_initialize = true

[server]
http_port = 9000
udp_port = 9000
host = "127.0.0.1"

[paths]
root = "./"
database = "opensim.db"
logs = "logs"
assets = "assets"

[development]
debug_mode = true
hot_reload = false
verbose_logging = true

[binary]
debug_path = "target/debug/opensim-next"
release_path = "target/release/opensim-next"