[Startup]
; OpenSim Next Configuration
; Generated by Setup Wizard

; Physics engine selection
physics = ubODE

; Script engine selection  
DefaultScriptEngine = XEngine

; Database settings
storage_connection_string = "Host=localhost;Database=opensim_db;Username=opensim"
storage_provider = OpenSim.Data.PGSQL.dll

; Network settings
http_listener_port = 8080
http_listener_ssl = false

; Logging
LogLevel = INFO

; Region loading
regionload_regionsdir = "Regions"
regionload_webserver_url = ""

; Monitoring and metrics
enabled = true
serverStatsEnabled = true

; Performance settings
; Using default thread pool settings

; Include mode-specific configuration
[Includes]
Include-Common = "config-include/osslEnable.ini"
Include-Standalone = "config-include/StandaloneCommon.ini"

[Network]
ConsolePass = ""

[DatabaseService]
StorageProvider = "OpenSim.Data.PGSQL.dll"
ConnectionString = "Host=localhost;Database=opensim_db;Username=opensim"

[AssetService]
DefaultAssetLoader = "OpenSim.Framework.AssetLoader.Filesystem.dll"
AssetLoaderArgs = "assets/AssetSets.xml"

[GridService]
Region_My_Region = "./config/Regions/Regions.ini"

[FreeSwitchVoice]
Enabled = false

[MRMModule]
Enabled = false

[Hypergrid]
Enabled = true
AllowTeleportsToAnyRegion = true
DenyAnonymousAccess = false
HomeURI = "http://SYSTEMIP:8080"
GatekeeperURI = "http://SYSTEMIP:8080"

[UserAccountService]
LocalServiceModule = "OpenSim.Services.UserAccountService.dll:UserAccountService"
AuthenticationService = "OpenSim.Services.AuthenticationService.dll:PasswordAuthenticationService"
GridUserService = "OpenSim.Services.UserAccountService.dll:GridUserService"

[InventoryService]  
LocalServiceModule = "OpenSim.Services.InventoryService.dll:XInventoryService"

[GridUserService]
LocalServiceModule = "OpenSim.Services.UserAccountService.dll:GridUserService"

[PresenceService]
LocalServiceModule = "OpenSim.Services.PresenceService.dll:PresenceService"

[AvatarService]
LocalServiceModule = "OpenSim.Services.AvatarService.dll:AvatarService"

[FriendsService]
LocalServiceModule = "OpenSim.Services.FriendsService.dll:FriendsService"

[LibraryService]
LocalServiceModule = "OpenSim.Services.InventoryService.dll:LibraryService"
LibraryName = "OpenSim Library"
DefaultLibrary = "./inventory/Libraries.xml"
