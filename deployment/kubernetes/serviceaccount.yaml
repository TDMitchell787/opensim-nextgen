apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensim-next
  namespace: opensim-next
  labels:
    app: opensim-next
    component: serviceaccount
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/opensim-next-service-role
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opensim-next-role
  namespace: opensim-next
  labels:
    app: opensim-next
    component: rbac
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/status"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensim-next-rolebinding
  namespace: opensim-next
  labels:
    app: opensim-next
    component: rbac
subjects:
- kind: ServiceAccount
  name: opensim-next
  namespace: opensim-next
roleRef:
  kind: Role
  name: opensim-next-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opensim-next-cluster-role
  labels:
    app: opensim-next
    component: rbac
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/metrics"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opensim-next-cluster-rolebinding
  labels:
    app: opensim-next
    component: rbac
subjects:
- kind: ServiceAccount
  name: opensim-next
  namespace: opensim-next
roleRef:
  kind: ClusterRole
  name: opensim-next-cluster-role
  apiGroup: rbac.authorization.k8s.io