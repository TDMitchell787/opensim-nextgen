apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opensim-next-assets
  namespace: opensim-next
  labels:
    app: opensim-next
    component: storage
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: aws-efs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opensim-next-database
  namespace: opensim-next
  labels:
    app: opensim-next
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: gp3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opensim-next-logs
  namespace: opensim-next
  labels:
    app: opensim-next
    component: logs
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: aws-efs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opensim-next-backup
  namespace: opensim-next
  labels:
    app: opensim-next
    component: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
  storageClassName: gp3