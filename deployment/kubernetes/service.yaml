apiVersion: v1
kind: Service
metadata:
  name: opensim-next
  namespace: opensim-next
  labels:
    app: opensim-next
    component: server
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app: opensim-next
    component: server
  ports:
  - name: main
    port: 9000
    targetPort: 9000
    protocol: TCP
  - name: websocket
    port: 9001
    targetPort: 9001
    protocol: TCP
  - name: web
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: web-secure
    port: 443
    targetPort: 8080
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 300
---
apiVersion: v1
kind: Service
metadata:
  name: opensim-next-admin
  namespace: opensim-next
  labels:
    app: opensim-next
    component: admin
spec:
  type: ClusterIP
  selector:
    app: opensim-next
    component: server
  ports:
  - name: admin
    port: 8090
    targetPort: 8090
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: opensim-next-metrics
  namespace: opensim-next
  labels:
    app: opensim-next
    component: metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9100"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: opensim-next
    component: server
  ports:
  - name: metrics
    port: 9100
    targetPort: 9100
    protocol: TCP
  - name: node-metrics
    port: 9101
    targetPort: 9101
    protocol: TCP