version: '3.8'

services:
  # OpenSim Next main service
  opensim-next:
    build: 
      context: ../../
      dockerfile: deployment/docker/Dockerfile
    image: opensim-next:latest
    container_name: opensim-next
    restart: unless-stopped
    ports:
      - "9000:9000"   # Main server
      - "9001:9001"   # WebSocket
      - "8080:8080"   # Web interface
      - "8090:8090"   # Admin interface
      - "9100:9100"   # Metrics
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://opensim:opensim123@postgres:5432/opensim
      - REDIS_URL=redis://redis:6379
      - OPENSIM_API_KEY=dev-api-key-change-in-production
      - OPENSIM_INSTANCE_ID=docker-dev
    volumes:
      - assets_data:/assets
      - logs_data:/logs
      - ./config:/config:ro
    depends_on:
      - postgres
      - redis
    networks:
      - opensim-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: opensim-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=opensim
      - POSTGRES_USER=opensim
      - POSTGRES_PASSWORD=opensim123
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - opensim-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensim -d opensim"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: opensim-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - opensim-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: opensim-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - logs_data:/var/log/nginx
    depends_on:
      - opensim-next
    networks:
      - opensim-network

  # Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: opensim-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - opensim-network

  # Grafana dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: opensim-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - opensim-network

  # Log aggregation
  fluentd:
    image: fluent/fluentd:v1.16-debian-1
    container_name: opensim-fluentd
    restart: unless-stopped
    volumes:
      - ./logging/fluentd.conf:/fluentd/etc/fluent.conf:ro
      - logs_data:/fluentd/log
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    networks:
      - opensim-network

  # Development tools (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: opensim-pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@opensim.dev
      - PGADMIN_DEFAULT_PASSWORD=admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - opensim-network
    profiles:
      - dev

  # Redis Commander (optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: opensim-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:redis123
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - opensim-network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  assets_data:
    driver: local
  logs_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  opensim-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16