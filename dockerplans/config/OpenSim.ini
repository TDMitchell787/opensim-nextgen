[Startup]
; OpenSim NextGen - Docker Grid Configuration
; 4-region grid with PostgreSQL backend

; Physics engine
physics = "ubODE"

; OSSL scripting functions
AllowOSFunctions = true
OSFunctionThreatLevel = VeryHigh

; Grid identification
GridName = "OpenSim NextGen Grid"
GridNick = "NextGen"
WelcomeMessage = "Welcome to OpenSim NextGen Grid!"

; Region configuration
region_file = "Regions/Regions.ini"
region_info_source = "filesystem"
regionload_regionsdir = "Regions"

; Database - PostgreSQL via Docker network
storage_connection_string = "Host=postgres;Database=opensim;Username=opensim;Password=opensim_secret_2024"
storage_provider = "OpenSim.Data.PGSQL.dll"

; Asset loading
AssetLoaderEnabled = true
DefaultAssetLoader = "OpenSim.Framework.AssetLoader.Filesystem.dll"
AssetLoaderArgs = "assets/AssetSets.xml"

; Network - port 9000 is the primary HTTP listener and first region
http_listener_port = 9000
ExternalHostNameForLSL = SYSTEMIP

; Hypergrid (disabled by default for Docker deployment)
HypergridLinkedRegions = false
Hypergrid = false
HomeURI = "http://SYSTEMIP:9000"
GatekeeperURI = "http://SYSTEMIP:9000"

; Performance
MaxAgents = 200
MaxPrims = 45000
NonPhysicalPrimMax = 32768
PhysicalPrimMax = 32768
ClampPrimSize = false

; Logging
LogLevel = INFO

; Protocol
UseLLUDPServer = true
PacketPool = true

; Architecture includes
Include-Architecture = "config-include/Standalone.ini"
Include-osslDefaultEnable = "config-include/osslDefaultEnable.ini"

[Network]
port = 9000
public_port = 9000
http_listener_port = 9000
use_ssl = false

[Hypergrid]
Enabled = false
HomeURI = "http://SYSTEMIP:9000"
GatekeeperURI = "http://SYSTEMIP:9000"

[Economy]
EconomyModule = ""
CurrencyServer = ""

[FreeSwitchVoice]
Enabled = false

[Groups]
Enabled = false
Module = "Default"

[Messaging]
Module = "InstantMessageModule"

[DataSnapshot]
index_sims = false

[Wind]
enabled = true
wind_plugin = "SimpleRandomWind"

[Cloud]
enabled = true
cloud_plugin = "CloudModule"

[Trees]
enabled = true

[VectorRender]
enabled = true

[TextureOnMapTile]
enabled = true
