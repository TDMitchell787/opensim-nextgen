[HybridAI]
; Master switch for AI NPC system
; When false, no AI NPCs will spawn and no LLM connections are made
enabled = false

; Enable NPC behavioral engine (wandering, patrolling, greeting)
behaviors_enabled = false

; Enable LLM-powered conversations
; When false, NPCs use canned keyword-matched responses only
llm_enabled = false

[LLM]
; Ollama endpoint - uses Docker host gateway for host access
endpoint = http://host.docker.internal:11434

; Model name - must be pulled in Ollama first: ollama pull <model>
; Options: llama3.2, mistral, codellama, phi3, gemma2, llama4:scout
model = llama4:scout

; Request timeout in seconds
timeout = 30

; Maximum tokens in response
max_tokens = 2048

; Temperature (0.0 = deterministic, 1.0 = creative)
temperature = 0.7
