[Modules]
; Grid service connectors for remote/grid mode operation
; Used when running separate region simulators connecting to a Robust server
; For standalone Docker deployment, Standalone.ini is used instead

AssetServices = "RemoteAssetServicesConnector"
InventoryServices = "RemoteXInventoryServicesConnector"
AvatarServices = "RemoteAvatarServicesConnector"
AuthenticationServices = "RemoteAuthenticationServicesConnector"
UserAccountServices = "RemoteUserAccountServicesConnector"
GridServices = "RemoteGridServicesConnector"
PresenceServices = "RemotePresenceServicesConnector"
FriendsServices = "RemoteFriendsServicesConnector"

MessageTransferModule = "MessageTransferModule"
LureModule = "LureModule"

PhysicsModule = "OpenSimNextPhysics"
EntityTransferModule = "OpenSimNextEntityTransfer"
HGEntityTransferModule = "OpenSimNextHGEntityTransfer"

[AssetService]
AssetServerURI = "http://SYSTEMIP:9000"

[InventoryService]
InventoryServerURI = "http://SYSTEMIP:9000"

[GridService]
GridServerURI = "http://SYSTEMIP:9000"

[AvatarService]
AvatarServerURI = "http://SYSTEMIP:9000"

[PresenceService]
PresenceServerURI = "http://SYSTEMIP:9000"

[UserAccountService]
UserAccountServerURI = "http://SYSTEMIP:9000"

[AuthenticationService]
AuthenticationServerURI = "http://SYSTEMIP:9000"

[FriendsService]
FriendsServerURI = "http://SYSTEMIP:9000"

[Messaging]
OfflineIMService = "http://SYSTEMIP:9000"
MuteListService = "http://SYSTEMIP:9000"

[Groups]
GroupsServerURI = "http://SYSTEMIP:9000"

[Economy]
EconomyServerURI = "http://SYSTEMIP:9000"

[HGInstantMessageService]
IMServerURI = "http://SYSTEMIP:9000"

[MapImageService]
MapImageServerURI = "http://SYSTEMIP:9000"

[Hypergrid]
HomeURI = "http://SYSTEMIP:9000"
GatekeeperURI = "http://SYSTEMIP:9000"
Enabled = true
AllowTeleportsToAnyRegion = true
DenyAnonymousAccess = false
ForeignAssetsAllowed = true
