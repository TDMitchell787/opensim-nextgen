[Includes]
; OpenSim NextGen Standalone Configuration (Docker)
; All services run in-process — no separate Robust server needed

Include-AssetService = "AssetService.ini"
Include-InventoryService = "InventoryService.ini"

[Modules]
; Local service connectors for standalone operation
AssetServices = "LocalAssetServicesConnector"
InventoryServices = "LocalInventoryServicesConnector"
GridServices = "LocalGridServicesConnector"
AvatarServices = "LocalAvatarServicesConnector"
PresenceServices = "LocalPresenceServicesConnector"
UserAccountServices = "LocalUserAccountServicesConnector"
AuthenticationServices = "LocalAuthenticationServicesConnector"
FriendsServices = "LocalFriendsServicesConnector"

; OpenSim NextGen enhanced modules
PhysicsModule = "OpenSimNextPhysics"
AssetCaching = "OpenSimNextCache"
ScriptEngine = "OpenSimNextLSL"

[DatabaseService]
StorageProvider = "OpenSim.Data.PGSQL.dll"
ConnectionString = "Host=postgres;Database=opensim;Username=opensim;Password=opensim_secret_2024"

[AssetService]
DefaultAssetLoader = "OpenSim.Framework.AssetLoader.Filesystem.dll"
AssetLoaderArgs = "assets/AssetSets.xml"

[GridService]
Region_Welcome_Plaza = "DefaultRegion, FallbackRegion"
DefaultRegionAccess = "PG"

[LibraryService]
LibraryName = "OpenSim Library"
DefaultLibrary = "./Library/LibraryAssets"

[LoginService]
WelcomeMessage = "Welcome to OpenSim NextGen Grid!"
SRV_HomeURI = "http://SYSTEMIP:9000"
SRV_InventoryServerURI = "http://SYSTEMIP:9000"
SRV_AssetServerURI = "http://SYSTEMIP:9000"

[GatekeeperService]
ExternalName = "http://SYSTEMIP:9000"
DeniedUsers = ""
DeniedRegions = ""

[UserAgentService]
ShowUserDetailsInHGProfile = True
