services:
  opensim-next:
    build:
      context: ../
      dockerfile: dockerplans/Dockerfile.ubuntu26
    container_name: opensim-nextgen
    env_file: .env  # copy .env.example to .env before first run
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://opensim:opensim_secret_2024@postgres:5432/opensim}
      - OPENSIM_EXTERNAL_HOSTNAME=${OPENSIM_EXTERNAL_HOSTNAME:-127.0.0.1}
      - RUST_LOG=${RUST_LOG:-info}
      - SEED_TEST_USER=true
    ports:
      # Region LLUDP ports (4 regions)
      - "9000:9000/tcp"
      - "9000:9000/udp"
      - "9001:9001/udp"
      - "9002:9002/udp"
      - "9003:9003/udp"
      # Web client
      - "8080:8080"
      # Admin API
      - "9200:9200"
      # Metrics / health
      - "9100:9100"
    volumes:
      - opensim_data:/var/lib/opensim-next
      - opensim_logs:/var/log/opensim-next
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped
    networks:
      - opensim_internal

  postgres:
    image: postgres:16-alpine
    container_name: opensim-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opensim}
      POSTGRES_USER: ${POSTGRES_USER:-opensim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opensim_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensim -d opensim"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: unless-stopped
    networks:
      - opensim_internal

volumes:
  opensim_data:
  opensim_logs:
  postgres_data:

networks:
  opensim_internal:
    driver: bridge
