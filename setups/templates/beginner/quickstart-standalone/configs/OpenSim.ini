[Startup]
; Quick Start Standalone - Beginner Template
; Auto-configured for immediate use
; No complex setup required

; Physics engine - stable and reliable
physics = "ubODE"

; Basic OSSL functions for learning
AllowOSFunctions = true
OSFunctionThreatLevel = Moderate

; Grid identification
GridName = "My First OpenSim World"
GridNick = "MyWorld"
WelcomeMessage = "Welcome to your personal virtual world! Have fun exploring and creating."

; Region configuration - single region setup
region_file = "Regions/Regions.ini"
region_info_source = "filesystem"

; Database settings - SQLite for simplicity (no database server required)
storage_connection_string = "URI=file:opensim.db,version=3"
storage_provider = "OpenSim.Data.SQLite.dll"

; Asset configuration - local storage
AssetLoaderEnabled = true
DefaultAssetLoader = "OpenSim.Framework.AssetLoader.Filesystem.dll"
AssetLoaderArgs = "assets/AssetSets.xml"

; Network configuration - standard ports
http_listener_port = 8080
ExternalHostNameForLSL = "127.0.0.1"

; Performance settings - optimized for single user
MaxAgents = 10
MaxPrims = 15000
NonPhysicalPrimMax = 256
PhysicalPrimMax = 64
ClampPrimSize = true

; Logging - informational level
LogLevel = INFO

; Performance - basic settings
UseLLUDPServer = true
PacketPool = true

; Include additional configuration
Include-Architecture = "config-include/Standalone.ini"

[Network]
; Network settings for local use
port = 9000
public_port = 9000
http_listener_port = 8080

[Economy]
; No economy module for simplicity
EconomyModule = ""

[Groups]
; Basic groups functionality
Enabled = true
Module = "Default"

[Messaging]
; Basic messaging
Module = "InstantMessageModule"

[Wind]
; Basic wind effects
enabled = true
wind_plugin = "SimpleRandomWind"

[Trees]
; Enable basic trees
enabled = true