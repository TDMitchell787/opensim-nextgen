[MyFirstRegion]
; Your first virtual world region
; A peaceful 256x256 meter island perfect for learning and exploring

RegionUUID = 12345678-1234-1234-1234-123456789012
Location = 1000,1000
InternalAddress = 0.0.0.0
InternalPort = 9000
AllowAlternatePorts = false
ExternalHostName = 127.0.0.1

; Region details
RegionName = MyFirstRegion
RegionType = Mainland

; Performance settings optimized for learning
NonphysicalPrimMax = 256
PhysicalPrimMax = 64
ClampPrimSize = true
MaxPrims = 15000
MaxAgents = 10

; Physics configuration
PhysicsEngine = ubODE
UseOSPhysics = true

; Estate configuration - you are the owner
MasterAvatarFirstName = NewUser
MasterAvatarLastName = Admin
MasterAvatarSandboxPassword = ""

; Estate settings
EstateName = My First Estate
EstateOwnerFirstName = NewUser
EstateOwnerLastName = Admin
EstateOwnerUUID = 11111111-1111-1111-1111-111111111111

; Parcel settings
DefaultParcelName = Welcome Area

; Performance settings
UpdateOnTimer = true
SendTerrainUpdatesByViewDistance = true

; Script settings - safe for beginners
AllowOSFunctions = true
OSFunctionThreatLevel = Moderate
AllowLightShareFunction = true

; Avatar settings
AllowAvatarPicking = true
MaxAvatarHeight = 3.0

; Environment settings - pleasant defaults
SunPosition = 0.3
WLCloudCoverage = 0.4
WLWaterHeight = 20